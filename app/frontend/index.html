<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Alt</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#313338;--bg-secondary:#2b2d31;--bg-tertiary:#1e1f22;
  --text:#f2f3f5;--text-dim:#b5bac1;--text-muted:#949ba4;
  --accent:#5865f2;--accent-h:#4752c4;--green:#23a559;--red:#f23f43;
  --input-bg:#383a40;--border:#3f4147;--hover:rgba(255,255,255,.06);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg-primary);color:var(--text);overflow:hidden;user-select:none}
button{cursor:pointer;font:inherit;border:none;background:none;color:inherit}
input{font:inherit;color:var(--text);background:var(--input-bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;outline:none;width:100%;user-select:text}
input:focus{border-color:var(--accent)}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
label{display:block;font-size:12px;text-transform:uppercase;color:var(--text-muted);
  letter-spacing:.5px;margin-bottom:4px;margin-top:14px}

/* ── Screens ─────────────────────────────────────── */
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg-tertiary);z-index:1000}
.card{background:var(--bg-secondary);padding:36px 40px;border-radius:16px;width:400px;
  text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card h1{font-size:24px;margin-bottom:4px}
.card .sub{color:var(--text-dim);font-size:14px;margin-bottom:8px}
.card input{margin-top:4px}
.btn{display:block;width:100%;padding:12px;border-radius:8px;font-weight:600;
  font-size:15px;transition:background .15s;margin-top:16px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-h)}
.error{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
.divider{color:var(--text-muted);font-size:13px;margin:14px 0 2px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:36%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}

/* ── App layout ──────────────────────────────────── */
#screen-app{display:none;height:100vh;flex-direction:row}
#sidebar{width:260px;background:var(--bg-secondary);display:flex;flex-direction:column;
  border-right:1px solid var(--border);flex-shrink:0}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-header button{font-size:16px;padding:4px 8px;border-radius:6px;background:var(--input-bg)}
.sidebar-header button:hover{background:var(--border)}
.sidebar-section{padding:12px 16px;flex:1;overflow-y:auto}
.sidebar-section h3{font-size:11px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;
  letter-spacing:.5px}
#user-list{list-style:none}
#user-list li{padding:5px 8px;border-radius:6px;display:flex;align-items:center;gap:8px;font-size:14px}
#user-list li:hover{background:var(--hover)}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.user-dot.in-call{background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sidebar-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;font-size:14px;font-weight:600}
.sidebar-footer button{font-size:18px;padding:2px 6px;border-radius:6px}
.sidebar-footer button:hover{background:var(--input-bg)}

#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Toolbar ─────────────────────────────────────── */
#toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;background:var(--bg-primary);flex-shrink:0}
#toolbar .room-label{font-weight:600;font-size:15px}
#call-controls{display:flex;gap:6px}
.ctrl-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:17px;background:var(--input-bg);transition:background .15s}
.ctrl-btn:hover{background:var(--border)}
.ctrl-btn.active{background:var(--accent)}
.ctrl-btn.danger{background:var(--red)}
.ctrl-btn.danger:hover{background:#d6363a}
.ctrl-btn.muted{opacity:.5}

/* ── Video grid ──────────────────────────────────── */
#video-area{display:none;padding:8px;gap:8px;flex-wrap:wrap;justify-content:center;
  background:var(--bg-tertiary);border-bottom:1px solid var(--border);max-height:45vh;overflow-y:auto}
.video-box{position:relative;border-radius:12px;overflow:hidden;background:#000;min-width:140px}
.video-box video{width:100%;height:100%;object-fit:cover;display:block}
.video-box .label{position:absolute;bottom:6px;left:8px;font-size:12px;background:rgba(0,0,0,.65);
  padding:2px 8px;border-radius:4px;color:#fff}
.video-box.local{border:2px solid var(--accent)}

/* ── Chat ────────────────────────────────────────── */
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;user-select:text}
.msg{padding:4px 0;line-height:1.45}
.msg:hover{background:var(--hover);border-radius:4px}
.msg-author{font-size:14px;font-weight:600;margin-right:8px}
.msg-author.me{color:var(--accent)}
.msg-time{font-size:11px;color:var(--text-muted);margin-right:8px}
.msg-text{font-size:14px;color:var(--text-dim);word-break:break-word}
.msg-text a{color:var(--accent)}
.msg-image img{max-width:320px;max-height:240px;border-radius:8px;margin-top:4px;cursor:pointer;
  display:block;transition:opacity .15s}
.msg-image img:hover{opacity:.85}
.msg-system{font-size:13px;color:var(--text-muted);text-align:center;padding:4px 0}

/* ── Input bar ───────────────────────────────────── */
#input-bar{padding:12px 16px;background:var(--bg-primary);border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-shrink:0}
#input-bar input{flex:1}
#input-bar button{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:19px;background:var(--input-bg);flex-shrink:0}
#input-bar button:hover{background:var(--border)}
#btn-send{background:var(--accent)!important;font-size:15px}
#btn-send:hover{background:var(--accent-h)!important}
#file-input{display:none}

/* ── Drop overlay ────────────────────────────────── */
#drop-overlay{display:none;position:fixed;inset:0;background:rgba(88,101,242,.25);
  z-index:2000;align-items:center;justify-content:center;pointer-events:none}
#drop-overlay .inner{background:var(--accent);color:#fff;padding:32px 48px;border-radius:16px;
  font-size:20px;font-weight:600;pointer-events:none}

/* ── Toast ───────────────────────────────────────── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg-secondary);color:var(--text);padding:10px 20px;border-radius:8px;
  font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;z-index:3000;
  pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- ═══ Connect Screen ═══ -->
<div id="screen-connect" class="overlay">
  <div class="card">
    <h1>💬 Discord Alt</h1>
    <p class="sub">Desktop messenger — connect to your server</p>

    <label>Server Address</label>
    <input id="inp-server" placeholder="http://your-server:3000">

    <label>Nickname</label>
    <input id="inp-name" placeholder="Your name" maxlength="20">

    <div class="divider">room</div>

    <label>Room Code <span style="font-size:11px;text-transform:none">(leave empty → create new)</span></label>
    <input id="inp-room" placeholder="e.g. abc123" maxlength="64">

    <button class="btn btn-primary" id="btn-connect">Connect</button>
    <p id="connect-error" class="error"></p>
  </div>
</div>

<!-- ═══ App ═══ -->
<div id="screen-app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2 id="room-title"># room</h2>
      <button id="btn-copy" title="Copy room code">📋</button>
    </div>
    <div class="sidebar-section">
      <h3>Online — <span id="user-count">0</span></h3>
      <ul id="user-list"></ul>
    </div>
    <div class="sidebar-footer">
      <span id="my-name"></span>
      <button id="btn-disconnect" title="Disconnect">⏏️</button>
    </div>
  </aside>

  <div id="main">
    <div id="toolbar">
      <span class="room-label" id="toolbar-room"></span>
      <div id="call-controls">
        <button class="ctrl-btn" id="btn-call" title="Join voice / video">📞</button>
        <button class="ctrl-btn" id="btn-mic" title="Toggle mic" style="display:none">🎤</button>
        <button class="ctrl-btn" id="btn-cam" title="Toggle camera" style="display:none">📹</button>
        <button class="ctrl-btn" id="btn-screen" title="Share screen" style="display:none">🖥️</button>
        <button class="ctrl-btn danger" id="btn-hangup" title="Leave call" style="display:none">📵</button>
      </div>
    </div>

    <div id="video-area"></div>
    <div id="messages"></div>

    <div id="input-bar">
      <button id="btn-attach" title="Upload file">📎</button>
      <input id="msg-input" placeholder="Type a message…" autocomplete="off">
      <button id="btn-send" title="Send">➤</button>
      <input type="file" id="file-input">
    </div>
  </div>
</div>

<div id="drop-overlay"><div class="inner">📁 Drop file to upload</div></div>
<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="main.js"></script>
</body>
</html>
