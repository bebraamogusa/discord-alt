<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Alt</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#313338;--bg-secondary:#2b2d31;--bg-tertiary:#1e1f22;
  --text:#f2f3f5;--text-dim:#b5bac1;--text-muted:#949ba4;
  --accent:#5865f2;--accent-h:#4752c4;--green:#23a559;--red:#f23f43;
  --input-bg:#383a40;--border:#3f4147;--hover:rgba(255,255,255,.06);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg-primary);color:var(--text);overflow:hidden}
button{cursor:pointer;font:inherit;border:none;background:none;color:inherit}
input{font:inherit;color:var(--text);background:var(--input-bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;outline:none;width:100%}
input:focus{border-color:var(--accent)}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

/* ── Landing / Login ─────────────────────────────── */
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg-tertiary);z-index:1000}
.card{background:var(--bg-secondary);padding:40px;border-radius:16px;width:380px;
  text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card h1{font-size:26px;margin-bottom:6px}
.card p{color:var(--text-dim);margin-bottom:24px;font-size:14px}
.card input{margin-bottom:12px}
.card .btn{display:block;width:100%;padding:12px;border-radius:8px;font-weight:600;
  font-size:15px;transition:background .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-h)}
.btn-danger{background:var(--red);color:#fff}
.divider{color:var(--text-muted);font-size:13px;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}

/* ── App layout ──────────────────────────────────── */
#app{display:none;height:100vh;flex-direction:row}
#sidebar{width:260px;background:var(--bg-secondary);display:flex;flex-direction:column;
  border-right:1px solid var(--border);flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-header button{font-size:18px;padding:4px 8px;border-radius:6px;background:var(--input-bg)}
.sidebar-header button:hover{background:var(--border)}
.sidebar-section{padding:12px 16px;flex:1;overflow-y:auto}
.sidebar-section h3{font-size:12px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;
  letter-spacing:.5px}
#user-list{list-style:none}
#user-list li{padding:6px 8px;border-radius:6px;display:flex;align-items:center;gap:8px;font-size:14px}
#user-list li:hover{background:var(--hover)}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.user-dot.in-call{background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Toolbar ─────────────────────────────────────── */
#toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;background:var(--bg-primary);flex-shrink:0}
#toolbar .room-label{font-weight:600;font-size:15px}
#call-controls{display:flex;gap:6px}
.ctrl-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;background:var(--input-bg);transition:background .15s}
.ctrl-btn:hover{background:var(--border)}
.ctrl-btn.active{background:var(--accent)}
.ctrl-btn.danger{background:var(--red)}
.ctrl-btn.danger:hover{background:#d6363a}
.ctrl-btn.muted{opacity:.5}

/* ── Video grid ──────────────────────────────────── */
#video-area{display:none;padding:8px;gap:8px;flex-wrap:wrap;justify-content:center;
  background:var(--bg-tertiary);border-bottom:1px solid var(--border);max-height:45vh;overflow-y:auto}
.video-box{position:relative;border-radius:12px;overflow:hidden;background:#000;min-width:140px}
.video-box video{width:100%;height:100%;object-fit:cover;display:block}
.video-box .label{position:absolute;bottom:6px;left:8px;font-size:12px;background:rgba(0,0,0,.65);
  padding:2px 8px;border-radius:4px;color:#fff}
.video-box.local{border:2px solid var(--accent)}

/* ── Chat ────────────────────────────────────────── */
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px}
.msg{padding:4px 0;line-height:1.45}
.msg:hover{background:var(--hover);border-radius:4px}
.msg-author{font-size:14px;font-weight:600;margin-right:8px}
.msg-author.me{color:var(--accent)}
.msg-time{font-size:11px;color:var(--text-muted);margin-right:8px}
.msg-text{font-size:14px;color:var(--text-dim);word-break:break-word}
.msg-text a{color:var(--accent)}
.msg-image img{max-width:320px;max-height:240px;border-radius:8px;margin-top:4px;cursor:pointer;
  display:block;transition:opacity .15s}
.msg-image img:hover{opacity:.85}
.msg-system{font-size:13px;color:var(--text-muted);text-align:center;padding:4px 0}

/* ── Input bar ───────────────────────────────────── */
#input-bar{padding:12px 16px;background:var(--bg-primary);border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-shrink:0}
#input-bar input{flex:1}
#input-bar button{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;background:var(--input-bg);flex-shrink:0}
#input-bar button:hover{background:var(--border)}
#btn-send{background:var(--accent)!important;font-size:16px}
#btn-send:hover{background:var(--accent-h)!important}
#file-input{display:none}

/* ── Drop overlay ────────────────────────────────── */
#drop-overlay{display:none;position:fixed;inset:0;background:rgba(88,101,242,.25);
  z-index:2000;align-items:center;justify-content:center;pointer-events:none}
#drop-overlay .inner{background:var(--accent);color:#fff;padding:32px 48px;border-radius:16px;
  font-size:20px;font-weight:600;pointer-events:none}

/* ── Toast ───────────────────────────────────────── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg-secondary);color:var(--text);padding:10px 20px;border-radius:8px;
  font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;z-index:3000;
  pointer-events:none}
#toast.show{opacity:1}

/* ── Responsive ──────────────────────────────────── */
@media(max-width:700px){
  #sidebar{display:none}
  .card{width:92vw;padding:24px}
}
</style>
</head>
<body>

<!-- ═══ Landing ═══ -->
<div id="landing" class="overlay">
  <div class="card">
    <h1>💬 Discord Alt</h1>
    <p>Simple group chat with video calls</p>
    <input id="l-name" placeholder="Your nickname" maxlength="20" autofocus>
    <button class="btn btn-primary" id="btn-create">Create Room</button>
    <div class="divider">or join existing</div>
    <input id="l-room" placeholder="Room ID" maxlength="64">
    <button class="btn btn-primary" id="btn-join-landing" style="margin-top:4px">Join Room</button>
  </div>
</div>

<!-- ═══ Login (direct room link) ═══ -->
<div id="login" class="overlay" style="display:none">
  <div class="card">
    <h1>💬 Join Room</h1>
    <p id="login-room-label"></p>
    <input id="j-name" placeholder="Your nickname" maxlength="20">
    <button class="btn btn-primary" id="btn-join-login" style="margin-top:8px">Join</button>
  </div>
</div>

<!-- ═══ App ═══ -->
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2 id="room-title"></h2>
      <button id="btn-copy" title="Copy invite link">📋</button>
    </div>
    <div class="sidebar-section">
      <h3>Online — <span id="user-count">0</span></h3>
      <ul id="user-list"></ul>
    </div>
  </aside>

  <div id="main">
    <div id="toolbar">
      <span class="room-label" id="toolbar-room"></span>
      <div id="call-controls">
        <button class="ctrl-btn" id="btn-call" title="Join call">📞</button>
        <button class="ctrl-btn" id="btn-mic" title="Mute" style="display:none">🎤</button>
        <button class="ctrl-btn" id="btn-cam" title="Camera" style="display:none">📹</button>
        <button class="ctrl-btn" id="btn-screen" title="Share screen" style="display:none">🖥️</button>
        <button class="ctrl-btn danger" id="btn-hangup" title="Leave call" style="display:none">📵</button>
      </div>
    </div>

    <div id="video-area"></div>
    <div id="messages"></div>

    <div id="input-bar">
      <button id="btn-attach" title="Upload image">📎</button>
      <input id="msg-input" placeholder="Type a message…" autocomplete="off">
      <button id="btn-send" title="Send">➤</button>
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp">
    </div>
  </div>
</div>

<div id="drop-overlay"><div class="inner">📁 Drop image to upload</div></div>
<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
/* ================================================================
   State
   ================================================================ */
let socket = null;
let roomId = null;
let username = null;
let localStream = null;
let screenStream = null;
let inCall = false;
let micOn = true;
let camOn = true;
const peers = new Map(); // socketId → { pc, remoteStream }

const ICE = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
];

/* ================================================================
   Helpers
   ================================================================ */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function linkify(text) {
  const safe = esc(text);
  return safe.replace(/(https?:\/\/[^\s<]+)/g, u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
}

function genId(len) {
  const c = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let s = '';
  for (let i = 0; i < len; i++) s += c[Math.random() * c.length | 0];
  return s;
}

function toast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

/* ================================================================
   Init
   ================================================================ */
(function init() {
  const path = location.pathname;
  const stored = sessionStorage.getItem('username');

  if (path.startsWith('/room/')) {
    roomId = path.split('/room/')[1];
    if (stored) {
      username = stored;
      enterRoom();
    } else {
      showDirectLogin();
    }
  } else {
    showLanding();
  }
})();

function showLanding() {
  $('#landing').style.display = 'flex';
  $('#login').style.display = 'none';
  $('#app').style.display = 'none';

  const savedName = sessionStorage.getItem('username') || '';
  $('#l-name').value = savedName;

  $('#btn-create').onclick = () => {
    const name = $('#l-name').value.trim();
    if (!name) return $('#l-name').focus();
    username = name;
    roomId = genId(8);
    sessionStorage.setItem('username', name);
    history.pushState(null, '', `/room/${roomId}`);
    enterRoom();
  };

  $('#btn-join-landing').onclick = () => {
    const name = $('#l-name').value.trim();
    const rid = $('#l-room').value.trim();
    if (!name) return $('#l-name').focus();
    if (!rid) return $('#l-room').focus();
    username = name;
    roomId = rid;
    sessionStorage.setItem('username', name);
    history.pushState(null, '', `/room/${roomId}`);
    enterRoom();
  };

  $('#l-name').addEventListener('keydown', e => { if (e.key === 'Enter') $('#btn-create').click(); });
  $('#l-room').addEventListener('keydown', e => { if (e.key === 'Enter') $('#btn-join-landing').click(); });
}

function showDirectLogin() {
  $('#landing').style.display = 'none';
  $('#login').style.display = 'flex';
  $('#app').style.display = 'none';
  $('#login-room-label').textContent = `Room: ${roomId}`;

  $('#btn-join-login').onclick = () => {
    const name = $('#j-name').value.trim();
    if (!name) return $('#j-name').focus();
    username = name;
    sessionStorage.setItem('username', name);
    enterRoom();
  };

  $('#j-name').addEventListener('keydown', e => { if (e.key === 'Enter') $('#btn-join-login').click(); });
  $('#j-name').focus();
}

/* ================================================================
   Enter Room
   ================================================================ */
function enterRoom() {
  $('#landing').style.display = 'none';
  $('#login').style.display = 'none';
  $('#app').style.display = 'flex';
  $('#room-title').textContent = `# ${roomId}`;
  $('#toolbar-room').textContent = `# ${roomId}`;
  document.title = `${roomId} — Discord Alt`;

  connectSocket();
  setupChat();
  setupDragDrop();
  setupCallControls();
}

/* ================================================================
   Socket.io
   ================================================================ */
function connectSocket() {
  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    socket.emit('join-room', { roomId, username });
    loadHistory();
  });

  socket.on('room-users', (users) => {
    updateUserList(users);
    // Update video labels for remote peers
    users.forEach(u => {
      const el = document.getElementById('video-' + u.socketId);
      if (el) el.querySelector('.label').textContent = u.username;
    });
  });
  socket.on('chat-message', renderMessage);

  socket.on('call-user-joined', ({ socketId: sid }) => {
    if (!inCall) return;
    createPeer(sid, true);
  });

  socket.on('call-user-left', ({ socketId: sid }) => {
    removePeer(sid);
  });

  socket.on('webrtc-offer', async ({ from, offer }) => {
    if (!inCall) return;
    if (!peers.has(from)) createPeer(from, false);
    const { pc } = peers.get(from);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('webrtc-answer', { to: from, answer: pc.localDescription });
  });

  socket.on('webrtc-answer', async ({ from, answer }) => {
    const p = peers.get(from);
    if (p) await p.pc.setRemoteDescription(answer);
  });

  socket.on('webrtc-ice-candidate', ({ from, candidate }) => {
    const p = peers.get(from);
    if (p) p.pc.addIceCandidate(candidate).catch(() => {});
  });

  socket.on('disconnect', () => toast('Connection lost, reconnecting…'));

  // Socket.io v4: reconnect lives on the manager
  socket.io.on('reconnect', () => {
    socket.emit('join-room', { roomId, username });
    toast('Reconnected');
  });
}

/* ================================================================
   Chat
   ================================================================ */
function setupChat() {
  $('#msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
  $('#btn-send').onclick = sendText;
  $('#btn-attach').onclick = () => $('#file-input').click();
  $('#file-input').onchange = e => {
    if (e.target.files[0]) uploadFile(e.target.files[0]);
    e.target.value = '';
  };
  // paste images
  document.addEventListener('paste', e => {
    const item = Array.from(e.clipboardData?.items || []).find(i => i.type.startsWith('image/'));
    if (item) uploadFile(item.getAsFile());
  });
}

function sendText() {
  const input = $('#msg-input');
  const text = input.value.trim();
  if (!text || !socket) return;
  socket.emit('chat-message', { roomId, content: text, type: 'text' });
  input.value = '';
  input.focus();
}

async function loadHistory() {
  try {
    const res = await fetch(`/api/rooms/${roomId}/messages`);
    const msgs = await res.json();
    $('#messages').innerHTML = '';
    msgs.forEach(renderMessage);
  } catch (e) { console.error('Failed to load history', e); }
}

function renderMessage(msg) {
  const box = $('#messages');
  const div = document.createElement('div');

  if (msg.type === 'system') {
    div.className = 'msg-system';
    div.textContent = msg.content;
  } else {
    div.className = 'msg';
    const isMe = msg.username === username;
    const authorCls = isMe ? 'msg-author me' : 'msg-author';
    const time = fmtTime(msg.created_at);

    if (msg.type === 'image') {
      div.innerHTML = `<span class="${authorCls}">${esc(msg.username)}</span>`
        + `<span class="msg-time">${time}</span>`
        + `<div class="msg-image"><img src="${esc(msg.content)}" loading="lazy" onclick="window.open(this.src)"></div>`;
    } else {
      div.innerHTML = `<span class="${authorCls}">${esc(msg.username)}</span>`
        + `<span class="msg-time">${time}</span>`
        + `<span class="msg-text">${linkify(msg.content)}</span>`;
    }
  }

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

/* ================================================================
   File Upload & Drag-Drop
   ================================================================ */
async function uploadFile(file) {
  const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
  if (!allowed.includes(file.type)) return toast('Only images (jpg, png, gif, webp)');
  if (file.size > 5 * 1024 * 1024) return toast('Max file size is 5 MB');

  const fd = new FormData();
  fd.append('file', file);

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json()).error || 'Upload failed');
    const data = await res.json();
    socket.emit('chat-message', { roomId, content: data.url, type: 'image' });
  } catch (e) { toast('Upload failed: ' + e.message); }
}

function setupDragDrop() {
  let counter = 0;
  const ov = $('#drop-overlay');

  document.addEventListener('dragenter', e => { e.preventDefault(); counter++; ov.style.display = 'flex'; });
  document.addEventListener('dragleave', () => { counter--; if (counter <= 0) { counter = 0; ov.style.display = 'none'; } });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); counter = 0; ov.style.display = 'none';
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) uploadFile(f);
  });
}

/* ================================================================
   User List
   ================================================================ */
function updateUserList(users) {
  $('#user-count').textContent = users.length;
  const ul = $('#user-list');
  ul.innerHTML = '';
  users.forEach(u => {
    const li = document.createElement('li');
    const dot = u.inCall ? 'user-dot in-call' : 'user-dot';
    li.innerHTML = `<span class="${dot}"></span>${esc(u.username)}${u.inCall ? ' 🔊' : ''}`;
    ul.appendChild(li);
  });
}

/* ================================================================
   Copy Room Link
   ================================================================ */
$('#btn-copy').onclick = () => {
  navigator.clipboard.writeText(location.href).then(
    () => toast('Link copied!'),
    () => toast('Failed to copy')
  );
};

/* ================================================================
   Call Controls
   ================================================================ */
function setupCallControls() {
  $('#btn-call').onclick = joinCall;
  $('#btn-hangup').onclick = leaveCall;
  $('#btn-mic').onclick = toggleMic;
  $('#btn-cam').onclick = toggleCam;
  $('#btn-screen').onclick = toggleScreen;
}

function showCallUI() {
  $('#btn-call').style.display = 'none';
  $('#btn-mic').style.display = 'flex';
  $('#btn-cam').style.display = 'flex';
  $('#btn-screen').style.display = 'flex';
  $('#btn-hangup').style.display = 'flex';
  $('#video-area').style.display = 'flex';
}

function hideCallUI() {
  $('#btn-call').style.display = 'flex';
  $('#btn-mic').style.display = 'none';
  $('#btn-cam').style.display = 'none';
  $('#btn-screen').style.display = 'none';
  $('#btn-hangup').style.display = 'none';
  $('#video-area').style.display = 'none';
  $('#video-area').innerHTML = '';
  $('#btn-mic').classList.remove('muted');
  $('#btn-cam').classList.remove('muted');
  $('#btn-screen').classList.remove('active');
}

/* ================================================================
   WebRTC — Join / Leave Call
   ================================================================ */
async function joinCall() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
  } catch {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
      return toast('Cannot access camera or microphone');
    }
  }

  inCall = true;
  micOn = true;
  camOn = localStream.getVideoTracks().length > 0;
  showCallUI();
  addVideoBox('local', localStream, username + ' (You)', true);
  socket.emit('call-join');
}

function leaveCall() {
  inCall = false;
  socket.emit('call-leave');

  for (const [id] of peers) removePeer(id);
  peers.clear();

  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }

  hideCallUI();
}

/* ================================================================
   WebRTC — Peer Connections
   ================================================================ */
function createPeer(targetId, initiator) {
  if (peers.has(targetId)) removePeer(targetId);

  const pc = new RTCPeerConnection({ iceServers: ICE });

  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  if (screenStream) {
    const st = screenStream.getVideoTracks()[0];
    if (st) {
      const sender = pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender) sender.replaceTrack(st);
    }
  }

  pc.onicecandidate = e => {
    if (e.candidate) socket.emit('webrtc-ice-candidate', { to: targetId, candidate: e.candidate });
  };

  const remoteStream = new MediaStream();
  pc.ontrack = e => {
    if (e.streams && e.streams[0]) {
      e.streams[0].getTracks().forEach(t => {
        if (!remoteStream.getTrackById(t.id)) remoteStream.addTrack(t);
      });
    } else {
      remoteStream.addTrack(e.track);
    }
    addVideoBox(targetId, remoteStream, '', false);
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') {
      removePeer(targetId);
    }
  };

  peers.set(targetId, { pc, remoteStream });

  if (initiator) {
    pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
      socket.emit('webrtc-offer', { to: targetId, offer: pc.localDescription });
    });
  }
}

function removePeer(targetId) {
  const p = peers.get(targetId);
  if (p) { p.pc.close(); peers.delete(targetId); }
  const el = document.getElementById('video-' + targetId);
  if (el) el.remove();
  layoutVideos();
}

/* ================================================================
   WebRTC — Mic / Cam / Screen
   ================================================================ */
function toggleMic() {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => { t.enabled = micOn; });
  $('#btn-mic').classList.toggle('muted', !micOn);
  $('#btn-mic').textContent = micOn ? '🎤' : '🔇';
}

function toggleCam() {
  if (!localStream) return;
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => { t.enabled = camOn; });
  $('#btn-cam').classList.toggle('muted', !camOn);
}

async function toggleScreen() {
  if (screenStream) return stopScreen();

  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
  } catch { return; }

  const track = screenStream.getVideoTracks()[0];
  for (const [, { pc }] of peers) {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender) sender.replaceTrack(track);
  }

  const localVid = document.querySelector('#video-local video');
  if (localVid) localVid.srcObject = screenStream;
  $('#btn-screen').classList.add('active');

  track.onended = () => stopScreen();
}

function stopScreen() {
  if (!screenStream) return;
  screenStream.getTracks().forEach(t => t.stop());
  screenStream = null;

  const camTrack = localStream?.getVideoTracks()[0] || null;
  for (const [, { pc }] of peers) {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender) sender.replaceTrack(camTrack);
  }

  const localVid = document.querySelector('#video-local video');
  if (localVid && localStream) localVid.srcObject = localStream;
  $('#btn-screen').classList.remove('active');
}

/* ================================================================
   Video Grid
   ================================================================ */
function addVideoBox(id, stream, label, isLocal) {
  const existing = document.getElementById('video-' + id);
  if (existing) {
    existing.querySelector('video').srcObject = stream;
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'video-box' + (isLocal ? ' local' : '');
  wrap.id = 'video-' + id;

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  if (isLocal) video.muted = true;
  video.srcObject = stream;

  const lbl = document.createElement('span');
  lbl.className = 'label';
  lbl.textContent = label || '';

  wrap.appendChild(video);
  wrap.appendChild(lbl);
  $('#video-area').appendChild(wrap);
  layoutVideos();
}

function layoutVideos() {
  const area = $('#video-area');
  const count = area.children.length;
  if (count === 0) return;

  const w = count <= 2 ? 'calc(50% - 4px)' : count <= 4 ? 'calc(50% - 4px)' : 'calc(33.3% - 6px)';
  const h = count <= 2 ? '220px' : '170px';

  Array.from(area.children).forEach(box => {
    box.style.width = count === 1 ? '360px' : w;
    box.style.height = h;
  });
}
