<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Alt</title>
<style>
/* ── Reset + Variables ───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #313338;
  --bg-2:     #2b2d31;
  --bg-3:     #1e1f22;
  --bg-4:     #232428;
  --text:     #f2f3f5;
  --text-2:   #b5bac1;
  --text-3:   #949ba4;
  --accent:   #5865f2;
  --accent-h: #4752c4;
  --green:    #23a559;
  --red:      #f23f43;
  --orange:   #f0a500;
  --input-bg: #383a40;
  --border:   #3f4147;
  --hover:    rgba(255,255,255,.06);
  --radius:   8px;
}

html,body{
  height:100%;
  font-family: "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;font-size:14px;
}

/* ── Custom Scrollbar ─────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border)}

/* ── Base elements ────────────────────────────────────────────── */
button{cursor:pointer;font:inherit;border:none;background:none;color:inherit;
  display:inline-flex;align-items:center;justify-content:center}
input,textarea{font:inherit;color:var(--text);background:var(--input-bg);
  border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;
  outline:none;width:100%}
input:focus,textarea:focus{border-color:var(--accent)}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
svg{flex-shrink:0;pointer-events:none}

/* ── Overlay / Landing ──────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg-3);z-index:1000;
}
.card{
  background:var(--bg-2);padding:40px;border-radius:16px;width:400px;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5);
}
.card h1{font-size:24px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.card p{color:var(--text-2);margin-bottom:24px;font-size:13px}
.card input{margin-bottom:10px}
.btn{padding:11px 16px;border-radius:var(--radius);font-weight:600;font-size:14px;
  transition:background .15s,transform .1s;width:100%;display:block}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h)}
.divider{color:var(--text-3);font-size:12px;margin:14px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;
  height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}

/* ── App: Three-panel layout ─────────────────────────────────── */
#app{display:none;height:100vh;flex-direction:row}

/* ── Left panel: Rooms/Channels ──────────────────────────────── */
#panel-rooms{
  width:240px;background:var(--bg-2);display:flex;flex-direction:column;
  border-right:1px solid var(--border);flex-shrink:0;
}
.rooms-header{
  padding:0 16px;height:48px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  font-weight:700;font-size:15px;cursor:default;
}
.rooms-header .ic-btn{
  width:28px;height:28px;border-radius:6px;color:var(--text-3);
  transition:background .15s,color .15s;
}
.rooms-header .ic-btn:hover{background:var(--hover);color:var(--text)}
.channels-section{padding:16px 8px 0}
.channels-label{
  padding:4px 8px 4px 8px;font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--text-3);display:flex;
  align-items:center;justify-content:space-between;
}
.channels-label .ic-btn{
  width:20px;height:20px;border-radius:4px;color:var(--text-3);
  transition:background .15s,color .15s;
}
.channels-label .ic-btn:hover{color:var(--text)}
#room-list{list-style:none;margin-top:4px}
.room-item{
  display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);
  cursor:pointer;color:var(--text-3);transition:background .12s,color .12s;
  font-size:14px;font-weight:500;
}
.room-item:hover{background:var(--hover);color:var(--text-2)}
.room-item.active{background:rgba(255,255,255,.1);color:var(--text)}
.room-item .room-id{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;
}

/* ── Center panel: Chat ──────────────────────────────────────── */
#panel-chat{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}

/* Toolbar */
#chat-toolbar{
  height:48px;padding:0 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);flex-shrink:0;
}
.toolbar-left{display:flex;align-items:center;gap:10px}
.toolbar-channel{font-weight:700;font-size:15px;color:var(--text)}
.toolbar-right{display:flex;align-items:center;gap:4px}
.ic-btn{
  width:36px;height:36px;border-radius:var(--radius);color:var(--text-3);
  transition:background .15s,color .15s;
}
.ic-btn:hover{background:var(--hover);color:var(--text-2)}
.ic-btn.active{color:var(--accent)}
.ic-btn.danger{color:var(--red)}
.ic-btn.danger:hover{background:rgba(242,63,67,.1)}
.ic-btn.muted{color:var(--text-3);opacity:.5}

/* Call controls */
#call-controls{display:flex;align-items:center;gap:4px}

/* Video area */
#video-area{
  display:none;padding:8px;gap:8px;flex-wrap:wrap;justify-content:center;
  background:var(--bg-3);border-bottom:1px solid var(--border);
  max-height:42vh;overflow-y:auto;
}
.video-box{position:relative;border-radius:12px;overflow:hidden;background:#000;min-width:120px}
.video-box video{width:100%;height:100%;object-fit:cover;display:block}
.video-box .label{
  position:absolute;bottom:6px;left:8px;font-size:11px;
  background:rgba(0,0,0,.7);padding:2px 8px;border-radius:4px;color:#fff;
}
.video-box.local{outline:2px solid var(--accent);outline-offset:-2px}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:16px 16px 4px;display:flex;flex-direction:column}

/* Message styles */
.msg{
  display:flex;gap:16px;padding:2px 16px 2px 16px;margin:0 -16px;
  border-radius:4px;position:relative;transition:background .08s;
}
.msg:hover{background:var(--hover)}
.msg-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;color:#fff;text-transform:uppercase;
  user-select:none;
}
.msg.msg-grouped .msg-avatar{
  width:40px;height:20px;background:none !important;
  font-size:0;
}
.msg-body{flex:1;min-width:0}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.msg-author{font-weight:600;font-size:14px}
.msg-author.me{color:var(--accent)}
.msg-time{font-size:11px;color:var(--text-3)}
.msg-text{font-size:14px;color:var(--text-2);line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg-text a{color:var(--accent)}
.msg-time-hover{
  font-size:10px;color:var(--text-3);position:absolute;left:16px;top:50%;
  transform:translateY(-50%);opacity:0;transition:opacity .1s;pointer-events:none;
  width:40px;text-align:center;
}
.msg.msg-grouped:hover .msg-time-hover{opacity:1}

/* Gap between message groups */
.msg:not(.msg-grouped){margin-top:16px}
.msg:not(.msg-grouped):first-child{margin-top:0}

/* FadeIn animation for new messages */
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.msg-new{animation:msgIn .18s ease-out forwards}

/* Media messages */
.msg-image img{
  max-width:400px;max-height:300px;border-radius:var(--radius);margin-top:6px;
  cursor:pointer;display:block;transition:opacity .15s;
}
.msg-image img:hover{opacity:.85}
.msg-video video{
  max-width:400px;max-height:280px;border-radius:var(--radius);margin-top:6px;
  display:block;background:#000;
}
.msg-audio audio{
  display:block;margin-top:6px;max-width:360px;width:100%;
}
.msg-file a{
  display:inline-flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--bg-4);border:1px solid var(--border);border-radius:var(--radius);
  margin-top:6px;font-size:13px;text-decoration:none;color:var(--text-2);
  transition:border-color .15s,color .15s;
}
.msg-file a:hover{border-color:var(--accent);color:var(--text)}
.msg-embed{
  margin-top:6px;border-left:4px solid var(--accent);background:var(--bg-4);
  border-radius:0 var(--radius) var(--radius) 0;padding:10px 12px;
  max-width:480px;display:flex;gap:10px;
}
.embed-text{flex:1;min-width:0}
.embed-site{font-size:11px;color:var(--text-3);margin-bottom:3px}
.embed-title{font-size:14px;font-weight:600;color:var(--accent);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.embed-desc{
  font-size:13px;color:var(--text-2);margin-top:3px;
  display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden
}
.embed-img{width:80px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0}

/* Message actions (hover bar) */
.msg-actions{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  display:none;gap:2px;background:var(--bg-2);border:1px solid var(--border);
  border-radius:var(--radius);padding:2px;
}
.msg:hover .msg-actions{display:flex}
.msg-action-btn{
  width:28px;height:28px;border-radius:6px;color:var(--text-3);
  transition:background .1s,color .1s;
}
.msg-action-btn:hover{background:var(--hover);color:var(--text)}
.msg-action-btn.del:hover{background:rgba(242,63,67,.2);color:var(--red)}

/* System message */
.msg-system{
  font-size:12px;color:var(--text-3);text-align:center;padding:8px 0;
  user-select:none;
}

/* Input bar */
#input-bar{
  padding:0 16px 16px;background:var(--bg);flex-shrink:0;
}
.input-wrap{
  background:var(--input-bg);border-radius:var(--radius);
  display:flex;align-items:center;gap:4px;padding:0 8px;
  border:1px solid transparent;transition:border-color .15s;
}
.input-wrap:focus-within{border-color:var(--border)}
#msg-input{
  flex:1;background:none;border:none;padding:11px 6px;resize:none;
  line-height:1.4;max-height:200px;outline:none;width:100%;
}
.input-action{
  width:36px;height:36px;border-radius:8px;color:var(--text-3);
  transition:color .15s;flex-shrink:0;
}
.input-action:hover{color:var(--text-2)}
#btn-send{color:var(--accent)}
#btn-send:hover{color:var(--accent-h)}
#file-input{display:none}

/* Drop overlay */
#drop-overlay{
  display:none;position:fixed;inset:0;background:rgba(88,101,242,.2);
  z-index:5000;align-items:center;justify-content:center;pointer-events:none;
}
#drop-overlay .inner{
  background:var(--accent);color:#fff;padding:28px 48px;border-radius:16px;
  font-size:18px;font-weight:700;pointer-events:none;
}

/* Toast */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--bg-2);color:var(--text);padding:10px 20px;border-radius:var(--radius);
  font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;
  transition:opacity .25s;z-index:9999;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1}

/* Admin modal */
#admin-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:8000;align-items:center;justify-content:center;
}
#admin-modal.open{display:flex}
.admin-card{
  background:var(--bg-2);border-radius:12px;width:340px;padding:28px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
}
.admin-card h2{font-size:17px;font-weight:700;margin-bottom:16px;
  display:flex;align-items:center;gap:8px}
.admin-close{
  margin-left:auto;width:28px;height:28px;border-radius:6px;
  color:var(--text-3);cursor:pointer;transition:background .15s,color .15s;
}
.admin-close:hover{background:var(--hover);color:var(--text)}
.admin-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.admin-actions button{
  padding:10px 12px;border-radius:var(--radius);background:var(--input-bg);
  font-size:13px;text-align:left;transition:background .15s;
  display:flex;align-items:center;gap:8px;
}
.admin-actions button:hover{background:var(--border)}
.admin-actions button.danger{background:rgba(242,63,67,.15);color:var(--red)}
.admin-actions button.danger:hover{background:rgba(242,63,67,.3)}
.admin-badge{
  background:var(--orange);color:#000;font-size:10px;
  padding:1px 6px;border-radius:4px;font-weight:700;
}

/* Right panel: Members */
#panel-members{
  width:240px;background:var(--bg-2);display:flex;flex-direction:column;
  border-left:1px solid var(--border);flex-shrink:0;
}
.members-header{
  padding:0 16px;height:48px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--text-3);
}
#user-list{list-style:none;overflow-y:auto;padding:8px;flex:1}
.user-item{
  display:flex;align-items:center;gap:10px;padding:6px 8px;
  border-radius:var(--radius);cursor:default;transition:background .12s;
}
.user-item:hover{background:var(--hover)}
.user-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-weight:700;font-size:13px;
  color:#fff;text-transform:uppercase;position:relative;
}
.status-dot{
  position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;
  border-radius:50%;border:2px solid var(--bg-2);background:var(--green);
}
.status-dot.away   {background:#faa61a}
.status-dot.offline{background:#72767d}
.status-dot.in-call{background:var(--accent)}

/* ── Lightbox ─────────────────────────────────────────────── */
#lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:5000;
  display:none;align-items:center;justify-content:center;cursor:zoom-out;
}
#lightbox img{
  max-width:90vw;max-height:90vh;border-radius:8px;
  object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.8);
}

/* ── VAD speaking ring ───────────────────────────────────────── */
.video-box.speaking{box-shadow:0 0 0 3px var(--green),0 4px 20px rgba(0,0,0,.4)}

/* ── Upload progress bar ─────────────────────────────────────── */
#input-bar{position:relative}
#upload-progress-bar{
  position:absolute;left:0;bottom:0;height:3px;width:0;
  background:var(--accent);border-radius:2px;
  transition:width .15s linear;pointer-events:none;z-index:1;
}

/* ── Typing indicator ─────────────────────────────────────────── */
#typing-bar{
  height:20px;padding:0 16px;font-size:12px;color:var(--text-3);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  font-style:italic;transition:opacity .2s;
}
#typing-bar .typing-dots span{
  display:inline-block;width:4px;height:4px;border-radius:50%;
  background:var(--text-3);animation:tdot 1.2s infinite;
  margin:0 1px;
}
#typing-bar .typing-dots span:nth-child(2){animation-delay:.2s}
#typing-bar .typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* ── Load-more sentinel ───────────────────────────────────────── */
#load-more-sentinel{height:1px}
#load-more-spinner{
  text-align:center;padding:8px;font-size:12px;color:var(--text-3);
  display:none;
}
/* Lazy-image fade in */
.msg-image img{opacity:0;transition:opacity .3s}
.msg-image img.loaded{opacity:1}

/* ── Record button ────────────────────────────────────────────── */
#btn-record{font-size:16px;transition:color .15s}
#btn-record.recording{color:var(--red)!important}
.user-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Unread badge on room list items ─────────────────────────── */
.unread-badge{
  min-width:18px;height:18px;padding:0 5px;
  background:var(--red);color:#fff;
  border-radius:9px;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin-left:auto;flex-shrink:0;line-height:1;
}
.btn-kick{
  margin-left:auto;font-size:11px;padding:2px 7px;border-radius:4px;
  background:var(--red);color:#fff;display:none;flex-shrink:0;
}
.user-item:hover .btn-kick{display:block}

/* Mobile hamburger (hidden on desktop) */
#btn-sidebar-toggle{display:none}

/* ── Responsive ──────────────────────────────────────────────── */
@media(max-width:900px){
  #panel-rooms{
    position:fixed;left:0;top:0;bottom:0;z-index:200;
    transform:translateX(-100%);transition:transform .22s ease;
  }
  #panel-rooms.open{transform:translateX(0)}
  #sidebar-backdrop{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;
  }
  #sidebar-backdrop.open{display:block}
  #btn-sidebar-toggle{display:flex}
  #panel-members{display:none}
}
@media(max-width:500px){
  .card{width:92vw;padding:24px}
}

/* ── Markdown rendering ──────────────────────────────────────── */
.md-b{font-weight:700;color:var(--text)}
.md-i{font-style:italic}
.md-s{text-decoration:line-through;opacity:.6}
.md-code{
  font-family:'Consolas','Fira Code',monospace;font-size:13px;
  background:var(--bg-3);padding:1px 5px;border-radius:4px;
  color:#e3e5e8;white-space:pre-wrap;
}
.md-pre{
  display:block;font-family:'Consolas','Fira Code',monospace;font-size:13px;
  background:var(--bg-3);padding:10px 14px;border-radius:6px;
  color:#e3e5e8;margin-top:6px;overflow-x:auto;white-space:pre;line-height:1.5;
}
.md-spoiler{
  background:var(--bg-3);color:transparent;border-radius:3px;
  cursor:pointer;transition:color .2s,background .2s;padding:0 3px;user-select:none;
}
.md-spoiler.revealed{background:rgba(255,255,255,.1);color:var(--text-2)}
.mention{
  color:var(--accent);background:rgba(88,101,242,.15);
  border-radius:3px;padding:0 3px;font-weight:500;
}
.mention.me{color:#fff;background:var(--accent)}

/* ── @mention autocomplete ───────────────────────────────────── */
#mention-popup{
  position:fixed;background:var(--bg-2);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:0 4px 20px rgba(0,0,0,.4);
  z-index:3000;min-width:200px;max-width:300px;overflow:hidden;display:none;
}
.mention-item{
  display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;
  transition:background .1s;
}
.mention-item:hover,.mention-item.selected{background:var(--hover)}
.mention-item .m-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-weight:700;font-size:11px;
  color:#fff;text-transform:uppercase;
}
.mention-item .m-name{font-size:13px;font-weight:500}

/* ── Inline message editing ──────────────────────────────────── */
.msg-edit-wrap{margin-top:4px;display:flex;flex-direction:column;gap:4px}
.msg-edit-input{
  background:var(--input-bg);border:1.5px solid var(--accent);
  border-radius:var(--radius);padding:8px 10px;font-size:14px;
  color:var(--text);resize:none;line-height:1.4;max-height:200px;
  width:100%;outline:none;
}
.msg-edit-hint{font-size:11px;color:var(--text-3)}
.msg-edit-hint kbd{
  font-family:inherit;background:var(--bg-3);border:1px solid var(--border);
  border-radius:3px;padding:0 4px;font-size:10px;
}
.msg-edited-mark{font-size:10px;color:var(--text-3);margin-left:4px}

/* ── Emoji picker ─────────────────────────────────────────────── */
#emoji-picker{
  position:fixed;background:var(--bg-2);border:1px solid var(--border);
  border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);
  z-index:4000;width:340px;display:none;flex-direction:column;
  overflow:hidden;
}
.ep-header{padding:8px 10px 6px;border-bottom:1px solid var(--border);flex-shrink:0}
.ep-search{
  width:100%;background:var(--bg-4);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);
  outline:none;
}
.ep-search:focus{border-color:var(--accent)}
.ep-cats{
  display:flex;gap:2px;padding:4px 8px 0;border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;
}
.ep-cats::-webkit-scrollbar{height:0}
.ep-cat{
  padding:4px 8px;border-radius:6px;font-size:17px;cursor:pointer;
  transition:background .12s;flex-shrink:0;line-height:1.4;
}
.ep-cat:hover,.ep-cat.active{background:var(--hover)}
.ep-grid{
  display:grid;grid-template-columns:repeat(8,1fr);gap:2px;
  padding:8px;overflow-y:auto;max-height:220px;
}
.ep-emoji{
  font-size:22px;line-height:1;padding:5px 3px;border-radius:6px;
  cursor:pointer;text-align:center;transition:background .1s;user-select:none;
}
.ep-emoji:hover{background:var(--hover)}

/* ── Reaction pills ───────────────────────────────────────────── */
.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.reaction-pill{
  display:inline-flex;align-items:center;gap:4px;padding:2px 8px;
  background:var(--bg-4);border:1px solid var(--border);border-radius:12px;
  cursor:pointer;font-size:13px;transition:background .12s,border-color .12s;
  user-select:none;
}
.reaction-pill:hover{background:var(--hover);border-color:var(--text-3)}
.reaction-pill.me{background:rgba(88,101,242,.2);border-color:var(--accent);color:var(--accent)}
.reaction-pill .r-emoji{font-size:16px;line-height:1}
.reaction-pill .r-count{font-size:12px;font-weight:600;min-width:10px}
.add-reaction-btn{
  display:none;align-items:center;justify-content:center;
  width:28px;height:22px;border-radius:12px;
  background:var(--bg-4);border:1px solid var(--border);
  cursor:pointer;font-size:14px;transition:background .12s;
  margin-top:4px;
}
.msg-reactions:not(:empty) + .add-reaction-btn,
.msg:hover .add-reaction-btn{display:flex}

/* ── User area bar */
.user-area{  margin-top:auto;padding:8px 8px;background:var(--bg-3);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  border-top:1px solid var(--border);
}
.ua-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;
}
.ua-info{flex:1;min-width:0;}
.ua-name{font-size:13px;font-weight:600;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.ua-tag{font-size:11px;color:var(--text-3);}
#btn-user-settings{width:32px;height:32px;border-radius:6px;color:var(--text-3);flex-shrink:0;padding:0;display:flex;align-items:center;justify-content:center;}
#btn-user-settings:hover{background:var(--hover);color:var(--text);}

/* ── Settings overlay */
#settings-overlay{
  position:fixed;inset:0;z-index:3000;background:var(--bg);
  display:none;opacity:0;transition:opacity .18s ease;
}
#settings-overlay.open{display:flex;}
#settings-overlay.visible{opacity:1;}
.settings-body{
  display:flex;width:100%;height:100%;
}
.settings-nav{
  width:232px;min-width:168px;background:var(--bg-2);
  padding:60px 8px 16px;overflow-y:auto;flex-shrink:0;
  display:flex;flex-direction:column;
  animation:settingsIn .2s ease-out;
}
.settings-content{
  flex:1;padding:60px 40px 40px;overflow-y:auto;
  animation:settingsIn .2s ease-out;
}
@keyframes settingsIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:none}}
.settings-nav-label{
  padding:6px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--text-3);margin-top:8px;
}
.settings-nav-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:4px;cursor:pointer;font-size:14px;color:var(--text-2);
  transition:background .1s,color .1s;width:100%;text-align:left;
  background:none;border:none;
}
.settings-nav-item:hover{background:var(--hover);color:var(--text);}
.settings-nav-item.active{background:rgba(255,255,255,.1);color:var(--text);}
.settings-nav-item.danger{color:var(--red);}
.settings-nav-item.danger:hover{background:var(--red);color:#fff;}
.settings-nav-divider{height:1px;background:var(--border);margin:6px 0;}
.settings-content h2{font-size:20px;font-weight:700;margin:0 0 20px;color:var(--text);}
.settings-content p{color:var(--text-2);font-size:14px;line-height:1.6;}
.settings-close-wrap{
  position:fixed;top:16px;right:16px;display:flex;align-items:center;
  gap:8px;color:var(--text-3);font-size:13px;cursor:pointer;
  animation:settingsIn .2s ease-out;
}
.settings-close-btn{
  width:36px;height:36px;border-radius:50%;background:transparent;
  border:2px solid var(--text-3);color:var(--text-3);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .15s,color .15s;line-height:1;
}
.settings-close-wrap:hover .settings-close-btn{border-color:var(--text);color:var(--text);}
.settings-close-wrap:hover{color:var(--text);}
/* settings form elements */
.sett-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.sett-row:last-child{border-bottom:none;}
.sett-label{font-size:14px;color:var(--text);}
.sett-desc{font-size:12px;color:var(--text-3);margin-top:2px;}
.sett-toggle{
  width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;
  position:relative;background:var(--bg-4);transition:background .2s;flex-shrink:0;
}
.sett-toggle.on{background:var(--accent);}
.sett-toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;
  border-radius:50%;background:#fff;transition:transform .2s;
}
.sett-toggle.on::after{transform:translateX(18px);}
.sett-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin:20px 0 8px;}
.sett-kbd-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.sett-kbd-row:last-child{border-bottom:none;}
.sett-kbd{display:flex;gap:4px;}
.sett-kbd kbd{
  background:var(--bg-3);border:1px solid var(--border);border-radius:4px;
  padding:2px 7px;font-size:12px;font-family:monospace;color:var(--text-2);
}
.sett-about-logo{font-size:36px;text-align:center;margin-bottom:12px;}
.sett-about-version{font-size:13px;color:var(--text-3);text-align:center;margin-bottom:20px;}

/* ── Stage 2: Profile card + account form ── */
.profile-card{  width:300px;background:var(--bg-2);border-radius:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.55);overflow:hidden;
}
.profile-card-banner{height:60px;}
.profile-card-avatar-wrap{padding:0 16px;margin-top:-28px;margin-bottom:4px;}
.profile-card-avatar{
  width:80px;height:80px;border-radius:50%;
  border:4px solid var(--bg-2);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;color:#fff;
}
.profile-card-body{padding:4px 16px 16px;}
.profile-card-name{font-size:20px;font-weight:700;color:var(--text);line-height:1.2;}
.profile-card-tag{font-size:14px;color:var(--text-3);}
.profile-card-status{font-size:13px;color:var(--text-2);margin-top:4px;}
.profile-card-divider{height:1px;background:var(--border);margin:12px 0;}
.profile-card-section-title{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--text-3);margin-bottom:6px;
}
.profile-card-about{font-size:14px;color:var(--text-2);word-break:break-word;}
.profile-card-date{font-size:13px;color:var(--text-2);}
#profile-popup{position:fixed;z-index:2000;pointer-events:auto;}
/* account form */
.sett-avatar-grid{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px;}
.sett-avatar-option{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:20px;color:#fff;
  cursor:pointer;border:3px solid transparent;
  transition:transform .15s,border-color .15s;flex-shrink:0;
}
.sett-avatar-option:hover{transform:scale(1.1);}
.sett-avatar-option.selected{border-color:#fff;box-shadow:0 0 0 2px var(--accent);}
.sett-input{
  background:var(--bg-3);border:1px solid var(--border);border-radius:4px;
  padding:8px 12px;color:var(--text);font-size:14px;
  width:100%;box-sizing:border-box;font-family:inherit;
}
.sett-input:focus{outline:none;border-color:var(--accent);}
textarea.sett-input{resize:vertical;min-height:80px;}
.sett-char-count{font-size:11px;color:var(--text-3);text-align:right;margin-top:3px;}
.sett-nickname-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.sett-save-bar{
  position:sticky;bottom:0;background:var(--bg-4);
  border:1px solid var(--border);border-radius:8px;
  padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;margin-top:24px;gap:12px;box-sizing:border-box;
}
.sett-save-bar p{margin:0;font-size:14px;color:var(--text-2);}
.btn-primary{
  background:var(--accent);color:#fff;border:none;border-radius:4px;
  padding:8px 20px;font-size:14px;font-weight:600;cursor:pointer;
  transition:background .15s;white-space:nowrap;
}
.btn-primary:hover{background:var(--accent-h);}
.btn-ghost{
  background:none;border:none;color:var(--text-2);font-size:14px;
  cursor:pointer;padding:6px 12px;border-radius:4px;
}
.btn-ghost:hover{background:var(--hover);color:var(--text);}
.sett-nick-preview{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:var(--bg-3);border-radius:6px;margin-top:12px;
}
.sett-preview-avatar{
  width:40px;height:40px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;
  font-weight:700;font-size:16px;color:#fff;flex-shrink:0;
}
.sett-color-wrap{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.sett-color-swatch{
  width:48px;height:36px;border-radius:6px;
  border:1px solid var(--border);flex-shrink:0;
}
.sett-color-btn{
  position:relative;width:36px;height:36px;border-radius:4px;
  border:2px solid var(--border);overflow:hidden;cursor:pointer;flex-shrink:0;
}
.sett-color-btn input[type="color"]{
  position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);
  border:none;cursor:pointer;opacity:0;z-index:1;
}
.sett-color-btn-fill{width:100%;height:100%;}
.sett-msg-avatar{cursor:pointer;transition:transform .1s;}
.sett-msg-avatar:hover{transform:scale(1.15);}

/* ── Stages 3–7 ──────────────────────────────────────────────── */
/* Avatar image support */
:root { --avatar-size: 40px; }
.msg-avatar { width:var(--avatar-size);height:var(--avatar-size); }
.msg-avatar img,.profile-card-avatar img,.sett-preview-avatar img,.ua-avatar img {
  width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;
}
.sett-preview-avatar { width:var(--avatar-size);height:var(--avatar-size); }

/* Compact mode */
body.compact .msg { padding:1px 16px; }
body.compact .msg-avatar { display:none; }
body.compact .msg-body { padding-left:0; }
body.compact .msg-grouped { margin-top:0; }

/* Theme grid */
.theme-grid { display:flex;gap:12px;flex-wrap:wrap;margin:12px 0; }
.theme-card {
  width:100px;border-radius:8px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:border-color .15s,transform .1s;
}
.theme-card:hover { transform:scale(1.04); }
.theme-card.selected { border-color:var(--accent); }
.theme-card-label { font-size:12px;text-align:center;padding:6px 4px;background:var(--bg-3);color:var(--text-2); }
.theme-preview { height:52px;display:flex;gap:4px;padding:6px; }
.theme-preview-dark   .tp-2 { background:#2b2d31; }
.theme-preview-dark   .tp-3 { background:#313338; }
.theme-preview-light  .tp-2 { background:#f2f3f5; }
.theme-preview-light  .tp-3 { background:#ffffff; }
.theme-preview-amoled .tp-2 { background:#070707; }
.theme-preview-amoled .tp-3 { background:#000000; }
.theme-preview-custom .tp-2 { background:var(--bg-2); }
.theme-preview-custom .tp-3 { background:var(--bg); }
.tp-2 { width:32px;border-radius:4px;background:var(--bg-2); }
.tp-3 { flex:1;border-radius:4px;background:var(--bg); }

/* Sliders */
.sett-slider-wrap { padding:4px 0 12px; }
.sett-range {
  width:100%;-webkit-appearance:none;appearance:none;height:4px;
  border-radius:2px;background:var(--bg-3);outline:none;cursor:pointer;margin:8px 0 4px;
}
.sett-range::-webkit-slider-thumb {
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);cursor:pointer;border:2px solid #fff;
}
.sett-slider-labels { display:flex;justify-content:space-between;font-size:11px;color:var(--text-3); }
.sett-font-preview {
  padding:10px 12px;background:var(--bg-3);border-radius:6px;
  color:var(--text-2);margin-top:8px;border-left:3px solid var(--accent);
}
.sett-scale-display,.sett-notif-vol-display {
  text-align:center;font-size:13px;color:var(--text-2);padding:4px 0;
}

/* Chat BG presets */
.bg-presets { display:flex;gap:8px;flex-wrap:wrap;margin:8px 0; }
.bg-preset {
  width:52px;height:36px;border-radius:6px;cursor:pointer;
  border:2px solid transparent;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.8);
  transition:border-color .15s,transform .1s;
}
.bg-preset:hover { transform:scale(1.08); }
.bg-preset.selected { border-color:var(--accent); }

/* Notification sounds */
.notif-sounds { display:flex;gap:8px;flex-wrap:wrap;margin:8px 0; }
.notif-sound-item {
  padding:8px 16px;border-radius:6px;cursor:pointer;
  background:var(--bg-3);border:2px solid transparent;
  font-size:13px;color:var(--text-2);transition:border-color .15s;
}
.notif-sound-item:hover { background:var(--hover); }
.notif-sound-item.selected { border-color:var(--accent);color:var(--text); }

/* Mic level bar */
.mic-level-bar { height:8px;border-radius:4px;background:var(--bg-3);overflow:hidden; }
.mic-level-fill { height:100%;width:0%;background:var(--green);border-radius:4px;transition:width .05s; }

/* Keybind listening box */
#kb-listening { 
  display:none;margin-top:16px;padding:16px;
  border:2px dashed var(--accent);border-radius:8px;
  text-align:center;color:var(--text-2);font-size:14px;
}

/* Blocked users list */
.blocked-user-row {
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.blocked-user-row:last-child { border-bottom:none; }
.blocked-avatar {
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;
}

/* selected-mode button */
button.selected-mode { background:var(--accent) !important;color:#fff !important; }

/* Avatar upload btn in settings */
.sett-avatar-upload-btn {
  width:52px;height:52px;border-radius:50%;border:2px dashed var(--text-3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;color:var(--text-3);flex-shrink:0;
  transition:border-color .15s;
}
.sett-avatar-upload-btn:hover { border-color:var(--accent);color:var(--accent); }
</style>
</head>
<body>

<!-- Landing -->
<div id="landing" class="overlay">
  <div class="card">
    <h1>Discord Alt</h1>
    <p>Simple group chat with voice &amp; video</p>
    <input id="l-name" placeholder="Your nickname" maxlength="32" autofocus>
    <button class="btn btn-primary" id="btn-create" style="margin-bottom:6px">Create Room</button>
    <div class="divider">or join existing</div>
    <input id="l-room" placeholder="Room ID" maxlength="64" style="margin-bottom:8px">
    <button class="btn btn-primary" id="btn-join-landing">Join Room</button>
  </div>
</div>

<!-- Direct-link login -->
<div id="login" class="overlay" style="display:none">
  <div class="card">
    <h1>Join Room</h1>
    <p id="login-room-label"></p>
    <input id="j-name" placeholder="Your nickname" maxlength="32" style="margin-bottom:8px">
    <button class="btn btn-primary" id="btn-join-login">Join</button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <!-- LEFT: rooms/channels panel -->
  <nav id="panel-rooms">
    <div class="rooms-header">
      <span id="server-name">Discord Alt</span>
      <button class="ic-btn" id="btn-rooms-settings" title="Settings"></button>
    </div>
    <div class="channels-section">
      <div class="channels-label">
        <span>Text Channels</span>
        <button class="ic-btn" id="btn-new-room" title="Create room"></button>
      </div>
      <ul id="room-list"></ul>
    </div>
    <div class="user-area" id="user-area">
      <div class="ua-avatar" id="ua-avatar">?</div>
      <div class="ua-info">
        <span class="ua-name" id="ua-name">—</span>
        <span class="ua-tag" id="ua-status"></span>
      </div>
      <button class="ic-btn" id="btn-user-settings" title="User Settings (Ctrl+,)"></button>
    </div>
  </nav>
  <div id="sidebar-backdrop"></div>

  <!-- CENTER: chat -->
  <div id="panel-chat">
    <div id="chat-toolbar">
      <div class="toolbar-left">
        <button class="ic-btn" id="btn-sidebar-toggle" title="Toggle rooms"></button>
        <span id="toolbar-channel" class="toolbar-channel"></span>
      </div>
      <div class="toolbar-right" id="call-controls">
        <button class="ic-btn" id="btn-copy" title="Copy invite link"></button>
        <button class="ic-btn" id="btn-admin" title="Admin panel"></button>
        <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
        <button class="ic-btn" id="btn-call" title="Join voice call"></button>
        <button class="ic-btn" id="btn-mic" title="Mute" style="display:none"></button>
        <button class="ic-btn" id="btn-cam" title="Toggle camera" style="display:none"></button>
        <button class="ic-btn" id="btn-screen" title="Share screen" style="display:none"></button>
        <button class="ic-btn danger" id="btn-hangup" title="Leave call" style="display:none"></button>
      </div>
    </div>

    <div id="video-area"></div>
    <div id="load-more-spinner">Loading older messages...</div>
    <div id="messages"></div>
    <div id="typing-bar"></div>

    <div id="input-bar">
      <div class="input-wrap">
        <button class="input-action" id="btn-attach" title="Upload file"></button>
        <button class="input-action" id="btn-emoji" title="Emoji" style="font-size:18px">&#128578;</button>
        <button class="input-action" id="btn-record" title="Record voice message">&#127908;</button>
        <textarea id="msg-input" placeholder="Send a message..." autocomplete="off" rows="1"></textarea>
        <button class="input-action" id="btn-send" title="Send"></button>
      </div>
      <div id="upload-progress-bar"></div>
      <input type="file" id="file-input">
    </div>
  </div>

  <!-- RIGHT: members panel -->
  <aside id="panel-members">
    <div class="members-header">
      <span>Members &mdash; <span id="user-count">0</span></span>
    </div>
    <ul id="user-list"></ul>
  </aside>
</div>

<!-- Admin modal -->
<div id="admin-modal">
  <div class="admin-card">
    <h2>
      <span id="admin-title-icon"></span>
      Admin Panel
      <span id="admin-status-badge"></span>
      <button class="admin-close" id="admin-close"></button>
    </h2>
    <div id="admin-login-form">
      <input id="admin-pw-input" type="password" placeholder="Admin password" style="margin-bottom:10px">
      <button class="btn btn-primary" id="btn-admin-login">Login</button>
    </div>
    <div id="admin-actions-panel" style="display:none" class="admin-actions">
      <button id="btn-admin-clear" class="danger">
        <span id="icon-trash2"></span>
        Clear all messages in this room
      </button>
    </div>
  </div>
</div>

<div id="mention-popup"></div>
<div id="lightbox"><img id="lb-img" alt=""></div>
<div id="emoji-picker">
  <div class="ep-header"><input class="ep-search" id="ep-search" placeholder="Search emoji..." autocomplete="off"></div>
  <div class="ep-cats" id="ep-cats"></div>
  <div class="ep-grid" id="ep-grid"></div>
</div>
<div id="drop-overlay"><div class="inner">Drop file to upload</div></div>
<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>

/* ---- Markdown renderer ---------------------------------------- */
function mdRender(raw) {
  // Protect code blocks ```...```
  const blocks = [];
  let s = raw.replace(/```[\s\S]*?```/g, m => { blocks.push(m); return `\x00CB${blocks.length-1}\x00`; });
  // Protect inline code `...`
  const codes = [];
  s = s.replace(/`[^`\n]+`/g, m => { codes.push(m); return `\x00IC${codes.length-1}\x00`; });
  // Protect URLs
  const urlz = [];
  s = s.replace(/https?:\/\/[^\s)>\]"]+/g, m => { urlz.push(m); return `\x00URL${urlz.length-1}\x00`; });
  // HTML-escape
  s = esc(s);
  // Bold+italic combos
  s = s.replace(/\*\*\*(.+?)\*\*\*/gs, '<strong class="md-b"><em class="md-i">$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/gs,     '<strong class="md-b">$1</strong>');
  s = s.replace(/\*([^\*\n]+?)\*/gs,   '<em class="md-i">$1</em>');
  s = s.replace(/(?<![\w])_([^_\n]+)_(?![\w])/g, '<em class="md-i">$1</em>');
  s = s.replace(/~~(.+?)~~/gs, '<s class="md-s">$1</s>');
  s = s.replace(/\|\|(.+?)\|\|/gs, '<span class="md-spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  // Mentions
  s = s.replace(/@(\w+)/g, (_, name) => {
    const isMe = name === username;
    return `<span class="mention${isMe ? ' me' : ''}">@${esc(name)}</span>`;
  });
  // Restore URLs
  s = s.replace(/\x00URL(\d+)\x00/g, (_, i) => {
    const u = urlz[+i];
    return `<a href="${u}" target="_blank" rel="noopener noreferrer">${esc(u)}</a>`;
  });
  // Restore inline code
  s = s.replace(/\x00IC(\d+)\x00/g, (_, i) => {
    const code = codes[+i].slice(1,-1);
    return `<code class="md-code">${esc(code)}</code>`;
  });
  // Restore code blocks
  s = s.replace(/\x00CB(\d+)\x00/g, (_, i) => {
    const content = blocks[+i].replace(/^```[^\n]*\n?/, '').replace(/```$/, '').trimEnd();
    return `<span class="md-pre">${esc(content)}</span>`;
  });
  return s;
}

/* ---- Wrap selection in marker (Ctrl+B / Ctrl+I / Ctrl+`) ------ */
function wrapSelection(inp, marker) {
  const start = inp.selectionStart, end = inp.selectionEnd;
  const sel = inp.value.slice(start, end);
  const before = inp.value.slice(0, start), after = inp.value.slice(end);
  if (sel) {
    inp.value = before + marker + sel + marker + after;
    inp.selectionStart = start + marker.length;
    inp.selectionEnd   = end   + marker.length;
  } else {
    inp.value = before + marker + marker + after;
    inp.selectionStart = inp.selectionEnd = start + marker.length;
  }
  inp.focus();
  inp.dispatchEvent(new Event('input'));
}
function extractUrls(text) {
  return [...(text.matchAll(/https?:\/\/[^\s<>"']+/g))].map(m => m[0]);
}
function formatBytes(b) {
  if (b < 1024) return `${b} B`;
  if (b < 1048576) return `${(b/1024).toFixed(1)} KB`;
  return `${(b/1048576).toFixed(1)} MB`;
}
function genId(n) {
  return Math.random().toString(36).slice(2, 2+n);
}

// Derive consistent avatar color from username
function avatarColor(name) {
  const palette = ['#5865f2','#3ba55d','#ed4245','#faa81a','#eb459e','#56d364','#9b59b6'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return palette[h % palette.length];
}

  applyProfileToUI();
}

      uaAvatar.style.background = 'transparent';
    } else {
      uaAvatar.innerHTML = '';
      uaAvatar.textContent = username ? username.charAt(0).toUpperCase() : '?';
      uaAvatar.style.background = _profile.avatar_color || avatarColor(username || '');

  if (uaStatus) uaStatus.textContent = _profile.custom_status || '';
}

/* ================================================================
   Socket.io
   ================================================================ */
function connectSocket() {
  if (typeof io !== 'function') {
    toast('Socket.IO failed to load — refresh the page.', 'var(--red)');
    return;
  }
  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    socket.emit('join-room', { roomId, username });
    loadHistory();
    if (_heartbeatTimer) clearInterval(_heartbeatTimer);
    _heartbeatTimer = setInterval(() => socket?.emit('heartbeat'), 30000);
  });
  socket.on('room-users', updateUserList);
  socket.on('reaction-update', ({ msgId, reactions }) => renderReactions(msgId, reactions));
  socket.on('user-typing', ({ username: who }) => showTyping(who));
  socket.on('message-edited', ({ id, content }) => {
    if (id !== editingMsgId) applyEdit(id, content);
  });
  socket.on('chat-message', msg => {
    // Dedup optimistic messages from self
    if (msg.username === username && msg.type === 'text' && _pendingOptimistic.has(msg.content)) {
      const { tempId, ts } = _pendingOptimistic.get(msg.content);
      if (Date.now() - ts < 10000) {
        _pendingOptimistic.delete(msg.content);
        const el = document.getElementById('msg-' + tempId);
        if (el) { el.id = 'msg-' + msg.id; return; }
      }
    }
    renderMessage(msg, true);
    if (msg.username !== 'system' && msg.username !== username) {
      if (document.hidden) {
        unreadCounts[roomId] = (unreadCounts[roomId] || 0) + 1;
        renderRoomList();
        _updateDocTitle();
        _playNotifSound();
      }
      _showDesktopNotif(msg.username,
        msg.type === 'text' ? msg.content : `[${msg.type}]`);
    }
  });
  socket.on('message-deleted', ({ id }) => document.getElementById('msg-' + id)?.remove());
  socket.on('room-cleared', () => {
    $('#messages').innerHTML = '';
    lastGroupAuthor = null;
    lastGroupTime = 0;
    toast('Room cleared by admin', 'var(--orange)');
  });
  socket.on('kicked', ({ reason }) => {
    socket.disconnect();
    alert(`You were kicked: ${reason}`);
    location.href = '/';
  });
  socket.on('call-user-joined', ({ socketId: sid }) => { if (inCall) createPeer(sid, true); });
  socket.on('call-user-left', ({ socketId: sid }) => removePeer(sid));
  socket.on('webrtc-offer', async ({ from, offer }) => {
    if (!inCall) return;
    if (!peers.has(from)) createPeer(from, false);
    const { pc } = peers.get(from);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('webrtc-answer', { to: from, answer: pc.localDescription });
  });
  socket.on('webrtc-answer', async ({ from, answer }) => {
    const p = peers.get(from); if (p) await p.pc.setRemoteDescription(answer);
  });
  socket.on('webrtc-ice-candidate', ({ from, candidate }) => {
    const p = peers.get(from); if (p) p.pc.addIceCandidate(candidate).catch(()=>{});
  });
  socket.on('disconnect', () => {
    if (_heartbeatTimer) { clearInterval(_heartbeatTimer); _heartbeatTimer = null; }
    toast('Connection lost, reconnecting...');
  });
  socket.io.on('reconnect', () => {
    socket.emit('join-room', { roomId, username });
    toast('Reconnected');
  });
}

function setupChat() {
  const inp = $('#msg-input');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); return; }
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
      if      (e.key === 'b') { e.preventDefault(); wrapSelection(inp, '**'); }
      else if (e.key === 'i') { e.preventDefault(); wrapSelection(inp, '_'); }
      else if (e.key === '`') { e.preventDefault(); wrapSelection(inp, '`'); }
    }
  });
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 200) + 'px';
    // Typing indicator debounce
    if (_typingDebounce) clearTimeout(_typingDebounce);
    _typingDebounce = setTimeout(() => {
      socket?.emit('user-typing');
      _typingDebounce = null;
    }, 300);
  });
  $('#btn-send').onclick = sendText;
}
function sendText() {
  const inp  = $('#msg-input');
  const text = inp.value.trim();
  if (!text || !socket) return;
  if (text.length > 4000) return toast('Message too long (max 4000 chars)', 'var(--red)');
  // Optimistic: render immediately
  const tempId = 'optimistic-' + (++_optimisticSeq);
  const tempMsg = { id: tempId, username, type: 'text', content: text, created_at: Date.now(), reactions: [] };
  renderMessage(tempMsg, true);
  _pendingOptimistic.set(text, { tempId, ts: Date.now() });
  socket.emit('chat-message', { roomId, content: text, type: 'text' });
  inp.value = '';
  inp.style.height = 'auto';
}

async function loadHistory() {
  try {
    _historyExhausted = false;
    _oldestMsgId = null;
    const res  = await fetch(`/api/rooms/${roomId}/messages`);
    if (!res.ok) return;
    const msgs = await res.json();
    lastGroupAuthor = null;
    lastGroupTime   = 0;
    msgs.forEach(m => renderMessage(m, false));
    if (msgs.length > 0) _oldestMsgId = msgs[0].id;
    if (msgs.length < 100) _historyExhausted = true;
    const box = $('#messages');
    box.scrollTop = box.scrollHeight;
    _setupLoadMoreObserver();
  } catch {}
}

async function loadMore() {
  if (_historyExhausted || !_oldestMsgId) return;
  const spinner = $('#load-more-spinner');
  if (spinner) spinner.style.display = 'block';
  try {
    const res = await fetch(`/api/rooms/${roomId}/messages?before=${encodeURIComponent(_oldestMsgId)}`);
    if (!res.ok) return;
    const msgs = await res.json();
    if (spinner) spinner.style.display = 'none';
    if (!msgs.length) { _historyExhausted = true; return; }
    if (msgs.length < 100) _historyExhausted = true;
    const box     = $('#messages');
    const prevH   = box.scrollHeight;
    const sentinel = document.getElementById('load-more-sentinel');
    // Detach current messages, render older batch, re-attach
    const existing = [...box.children].filter(c => c !== sentinel);
    existing.forEach(c => c.remove());
    const prevAuthor = lastGroupAuthor, prevTime = lastGroupTime;
    lastGroupAuthor = null; lastGroupTime = 0;
    msgs.forEach(m => renderMessage(m, false));
    _oldestMsgId = msgs[0].id;
    existing.forEach(c => box.appendChild(c));
    lastGroupAuthor = prevAuthor; lastGroupTime = prevTime;
    box.scrollTop = box.scrollHeight - prevH;
  } catch { if (spinner) spinner.style.display = 'none'; }
}

function _setupLoadMoreObserver() {
  if (_loadMoreObserver) _loadMoreObserver.disconnect();
  // Inject sentinel at top of messages
  const box = $('#messages');
  let sentinel = document.getElementById('load-more-sentinel');
  if (!sentinel) {
    sentinel = document.createElement('div');
    sentinel.id = 'load-more-sentinel';
    box.insertBefore(sentinel, box.firstChild);
  }
  _loadMoreObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMore();
  }, { root: box, rootMargin: '100px 0px 0px 0px', threshold: 0 });
  _loadMoreObserver.observe(sentinel);
}

/* ================================================================
   Message rendering (with grouping)
   ================================================================ */
function isGrouped(msg) {
  if (msg.type === 'system') return false;
  if (!lastGroupAuthor || msg.username !== lastGroupAuthor) return false;
  const t = msg.created_at ? new Date(msg.created_at).getTime() : Date.now();
  return (t - lastGroupTime) < 7 * 60 * 1000;
}

function renderMessage(msg, isNew = false) {
  const box = $('#messages');
  const div = document.createElement('div');
  div.id = 'msg-' + msg.id;

  if (msg.type === 'system') {
    div.className = 'msg-system';
    div.textContent = msg.content;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return;
  }

  const grouped = isGrouped(msg);
  const t = msg.created_at ? new Date(msg.created_at).getTime() : Date.now();

  lastGroupAuthor = msg.username;
  lastGroupTime   = t;

  const isMe    = msg.username === username;
  const color   = avatarColor(msg.username);
  const initial = msg.username.charAt(0).toUpperCase();

  div.className = 'msg' + (grouped ? ' msg-grouped' : '') + (isNew ? ' msg-new' : '');

  // Avatar
  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  if (!grouped) {
    avatarEl.style.background = color;
    avatarEl.textContent = initial;
    avatarEl.classList.add('sett-msg-avatar');
    avatarEl.title = msg.username;
    avatarEl.addEventListener('click', e => {
      e.stopPropagation();
      showProfileCard(msg.username, e.clientX, e.clientY);
    });
  }

  // Body
  const bodyEl = document.createElement('div');
  bodyEl.className = 'msg-body';

  if (!grouped) {
    const headerEl = document.createElement('div');
    headerEl.className = 'msg-header';
    headerEl.innerHTML =
      `<span class="msg-author${isMe ? ' me' : ''}">${esc(msg.username)}</span>` +
      `<span class="msg-time">${fmtTime(msg.created_at)}</span>`;
    bodyEl.appendChild(headerEl);
  } else {
    const htEl = document.createElement('span');
    htEl.className = 'msg-time-hover';
    htEl.textContent = fmtTimeShort(msg.created_at);
    div.appendChild(htEl);
  }

  const contentEl = document.createElement('div');

  if (msg.type === 'image') {
    contentEl.className = 'msg-image';
    const img = document.createElement('img');
    img.src = msg.content;
    img.loading = 'lazy';
    img.alt = '';
    img.onclick = () => openLightbox(img.src);
    observeLazyImage(img);
    contentEl.appendChild(img);
  } else if (msg.type === 'video') {
    contentEl.className = 'msg-video';
    contentEl.innerHTML = `<video src="${esc(msg.content)}" controls preload="metadata"></video>`;
  } else if (msg.type === 'audio') {
    contentEl.className = 'msg-audio';
    contentEl.innerHTML = `<audio src="${esc(msg.content)}" controls preload="metadata"></audio>`;
  } else if (msg.type === 'file') {
    const fname = decodeURIComponent(msg.content.split('/').pop());
    contentEl.className = 'msg-file';
    contentEl.innerHTML = `<a href="${esc(msg.content)}" download="${esc(fname)}" target="_blank">${ic('file',14)} ${esc(fname)}</a>`;
  } else {
    contentEl.className = 'msg-text';
    contentEl.dataset.raw = msg.content;
    contentEl.innerHTML = sanitizeHtml(mdRender(msg.content));
    const urls = extractUrls(msg.content);
    if (urls.length) {
      fetchEmbed(urls[0]).then(embed => {
        if (embed && document.getElementById('msg-' + msg.id)) {
          bodyEl.appendChild(buildEmbedCard(embed, urls[0]));
        }
      });
    }
  }

  bodyEl.appendChild(contentEl);

  // Reactions area
  const reactArea = document.createElement('div');
  reactArea.className = 'msg-reactions';
  reactArea.id = 'reactions-' + msg.id;
  if (msg.reactions && msg.reactions.length) {
    buildReactionPills(reactArea, msg.id, msg.reactions);
  }
  bodyEl.appendChild(reactArea);

  // Add-reaction button (always present, shown on hover)
  const addReactBtn = document.createElement('button');
  addReactBtn.className = 'add-reaction-btn';
  addReactBtn.title = 'Add reaction';
  addReactBtn.textContent = '\u{1F642}';
  addReactBtn.onclick = e => { e.stopPropagation(); openEmojiPicker(e.currentTarget, msg.id); };
  bodyEl.appendChild(addReactBtn);

  // Action bar: edit (own messages) + delete (admin)
  if (msg.username === username || adminToken) {
    const actEl = document.createElement('div');
    actEl.className = 'msg-actions';
    if (msg.type === 'text' && msg.username === username) {
      const editBtn = document.createElement('button');
      editBtn.className = 'msg-action-btn';
      editBtn.title = 'Edit';
      editBtn.innerHTML = ic('pencil', 14);
      editBtn.onclick = e => {
        e.stopPropagation();
        const raw = div.querySelector('.msg-text')?.dataset.raw || msg.content;
        startEdit(div, msg.id, raw);
      };
      actEl.appendChild(editBtn);
    }
    if (adminToken) {
      const delBtn = document.createElement('button');
      delBtn.className = 'msg-action-btn del';
      delBtn.title = 'Delete';
      delBtn.innerHTML = ic('trash2', 14);
      delBtn.onclick = e => { e.stopPropagation(); deleteMessage(msg.id); };
      actEl.appendChild(delBtn);
    }
    div.appendChild(actEl);
  }

  div.appendChild(avatarEl);
  div.appendChild(bodyEl);
  box.appendChild(div);

  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 80;
  if (atBottom || isNew) box.scrollTop = box.scrollHeight;
}

function buildEmbedCard(embed, url) {
  const card = document.createElement('div');
  card.className = 'msg-embed';
  const desc = embed.description
    ? `<div class="embed-desc">${esc(embed.description)}</div>` : '';
  const img  = embed.image
    ? `<img class="embed-img" src="${esc(embed.image)}" loading="lazy" onerror="this.remove()">` : '';
  card.innerHTML = `<div class="embed-text">
    <div class="embed-site">${esc(embed.site || '')}</div>
    <a class="embed-title" href="${esc(url)}" target="_blank" rel="noopener">${esc(embed.title || url)}</a>
    ${desc}
  </div>${img}`;
  return card;
}

async function fetchEmbed(url) {
  if (embedCache.has(url)) return embedCache.get(url);
  try {
    const res = await fetch(`/api/embed?url=${encodeURIComponent(url)}`);
    if (!res.ok || res.status === 204) { embedCache.set(url, null); return null; }
    const data = await res.json();
    embedCache.set(url, data);
    return data;
  } catch { embedCache.set(url, null); return null; }
}

/* ================================================================
   File Upload & Drag-Drop
   ================================================================ */
const UPLOAD_EXTS = new Set([
  'jpg','jpeg','png','gif','webp','avif','svg','bmp',
  'mp4','webm','mov','avi','mkv','flv','wmv','m4v','ogv','3gp','ts','mts',
  'mp3','ogg','wav','flac','aac','m4a','opus','wma','weba',
  'pdf','txt','doc','docx','xls','xlsx','ppt','pptx',
  'zip','7z','rar','tar','gz',
]);

async function uploadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!UPLOAD_EXTS.has(ext)) return toast(`Unsupported file type: .${ext}`, 'var(--red)');
  if (file.size > 100 * 1024 * 1024) return toast('Max file size is 100 MB', 'var(--red)');
  const pb = $('#upload-progress-bar');
  const fd = new FormData();
  fd.append('file', file);
  return new Promise(resolve => {
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => {
      if (e.lengthComputable && pb) pb.style.width = (e.loaded / e.total * 100) + '%';
    };
    xhr.onload = () => {
      if (pb) pb.style.width = '0';
      if (xhr.status >= 200 && xhr.status < 300) {
        const data = JSON.parse(xhr.responseText);
        socket.emit('chat-message', { roomId, content: data.url, type: data.type });
      } else {
        let msg = 'Upload failed';
        try { msg = JSON.parse(xhr.responseText).error || msg; } catch {}
        toast(msg, 'var(--red)');
      }
      resolve();
    };
    xhr.onerror = () => { if (pb) pb.style.width = '0'; toast('Upload failed', 'var(--red)'); resolve(); };
    xhr.open('POST', '/api/upload');
    xhr.send(fd);
  });
}

function setupDragDrop() {
  const ov = $('#drop-overlay');
  const fi = $('#file-input');
  $('#btn-attach').onclick = () => fi.click();
  fi.onchange = () => { if (fi.files[0]) { uploadFile(fi.files[0]); fi.value = ''; } };
  let counter = 0;
  document.addEventListener('dragenter', e => {
    e.preventDefault(); counter++;
    ov.style.display = 'flex';
  });
  document.addEventListener('dragleave', () => {
    counter--; if (counter <= 0) { counter = 0; ov.style.display = 'none'; }
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); counter = 0; ov.style.display = 'none';
    const f = e.dataTransfer.files[0];
    if (f) uploadFile(f);
  });
}

async function adminReq(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: {
      'Authorization': `Bearer ${adminToken}`,
      ...(body ? { 'Content-Type': 'application/json' } : {}),
    },
    ...(body ? { body: JSON.stringify(body) } : {}),

  if (res.status === 401) {
    adminToken = null;
    sessionStorage.removeItem('adminToken');
    updateAdminUI();
    toast('Admin session expired', 'var(--red)');
    return null;
  }

async function joinCall() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
  } catch {
    try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch { return toast('Cannot access camera or microphone', 'var(--red)'); }
  }
  inCall = true; micOn = true;
  camOn = localStream.getVideoTracks().length > 0;
  showCallUI();
  addVideoBox('local', localStream, `${username} (You)`, true);
  startVAD(localStream);
  socket.emit('call-join');
}
function leaveCall() {
  inCall = false;
  stopVAD();
  socket.emit('call-leave');
  for (const [id] of peers) removePeer(id);
  peers.clear();
  if (localStream)  { localStream.getTracks().forEach(t => t.stop());  localStream  = null; }
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  hideCallUI();
}

function createPeer(targetId, initiator) {
  if (peers.has(targetId)) removePeer(targetId);
  const pc = new RTCPeerConnection({ iceServers: ICE.iceServers });
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = e => {
    if (e.candidate) socket.emit('webrtc-ice-candidate', { to: targetId, candidate: e.candidate });
  };
  const remoteStream = new MediaStream();
  pc.ontrack = e => {
    (e.streams?.[0] ? e.streams[0].getTracks() : [e.track]).forEach(t => {
      if (!remoteStream.getTrackById(t.id)) remoteStream.addTrack(t);
    });
    addVideoBox(targetId, remoteStream, '', false);
  };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') removePeer(targetId);
  };
  peers.set(targetId, { pc, remoteStream });
  if (initiator) {
    pc.createOffer()
      .then(o => pc.setLocalDescription(o))
      .then(() => socket.emit('webrtc-offer', { to: targetId, offer: pc.localDescription }));
  }
}
function removePeer(targetId) {
  const p = peers.get(targetId);
  if (p) { p.pc.close(); peers.delete(targetId); }
  document.getElementById('video-' + targetId)?.remove();
  layoutVideos();
}

function toggleMic() {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => { t.enabled = micOn; });
  $('#btn-mic').innerHTML = ic(micOn ? 'mic' : 'mic-off');
  $('#btn-mic').classList.toggle('muted', !micOn);
}
function toggleCam() {
  if (!localStream) return;
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => { t.enabled = camOn; });
  $('#btn-cam').innerHTML = ic(camOn ? 'video' : 'video-off');
  $('#btn-cam').classList.toggle('muted', !camOn);
}
async function toggleScreen() {
  if (screenStream) return stopScreen();
  try { screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true }); } catch { return; }
  const track = screenStream.getVideoTracks()[0];
  for (const [, { pc }] of peers) {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender) sender.replaceTrack(track);
  }
  const lv = document.querySelector('#video-local video');
  if (lv) lv.srcObject = screenStream;
  $('#btn-screen').classList.add('active');
  track.onended = () => stopScreen();
}
function stopScreen() {
  if (!screenStream) return;
  screenStream.getTracks().forEach(t => t.stop()); screenStream = null;
  const camTrack = localStream?.getVideoTracks()[0] || null;
  for (const [, { pc }] of peers) {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender) sender.replaceTrack(camTrack);
  }
  const lv = document.querySelector('#video-local video');
  if (lv && localStream) lv.srcObject = localStream;
  $('#btn-screen').classList.remove('active');
}

function addVideoBox(id, stream, label, isLocal) {
  let wrap = document.getElementById('video-' + id);
  if (wrap) { wrap.querySelector('video').srcObject = stream; return; }
  wrap = document.createElement('div');
  wrap.className = 'video-box' + (isLocal ? ' local' : '');
  wrap.id = 'video-' + id;
  const video = document.createElement('video');
  video.autoplay = true; video.playsInline = true;
  if (isLocal) video.muted = true;
  video.srcObject = stream;
  const lbl = document.createElement('span');
  lbl.className = 'label'; lbl.textContent = label || '';
  wrap.appendChild(video); wrap.appendChild(lbl);
  $('#video-area').appendChild(wrap);
  layoutVideos();
}
function layoutVideos() {
  const area = $('#video-area');
  const n = area.children.length;
  if (!n) return;
  const w = n === 1 ? '360px' : 'calc(50% - 4px)';
  const h = n <= 2 ? '220px' : '170px';
  Array.from(area.children).forEach(b => {
    b.style.width = w; b.style.height = h;
  });
}

function applyTheme(name) {
  const root = document.documentElement;
  const vars = THEMES[name];
  if (vars) {
    Object.entries(vars).forEach(([k, v]) => root.style.setProperty(k, v));
    localStorage.setItem('sett_theme', name);
  } else if (name === 'custom') {
    // custom vars set individually by pickers
    localStorage.setItem('sett_theme', 'custom');
    try {
      const custom = JSON.parse(localStorage.getItem('sett_customTheme') || '{}');
      Object.entries(custom).forEach(([k, v]) => root.style.setProperty(k, v));
    } catch {}
  }
}

function applyFontSize(px) {
  document.documentElement.style.setProperty('--msg-font-size', px + 'px');
  const msgs = document.querySelector('#messages');
  if (msgs) msgs.style.fontSize = px + 'px';
  localStorage.setItem('sett_fontSize', String(px));
}

function applyScale(pct) {
  const app = document.querySelector('#app');
  if (app) app.style.zoom = (pct / 100).toString();
  localStorage.setItem('sett_scale', String(pct));
}

function applyAvatarSize(px) {

function applyCompact(on) {
  document.body.classList.toggle('compact', !!on);

}

  const map = { ctrl:'Ctrl', shift:'Shift', alt:'Alt', meta:'⌘', arrowdown:'↓', arrowup:'↑', arrowleft:'←', arrowright:'→', ' ':'Space', escape:'Esc', enter:'Enter' };
  return keys.map(k => `<kbd>${map[k.toLowerCase()] || k.toUpperCase()}</kbd>`).join('');
}
function notifSound(type) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    const vol = (parseInt(localStorage.getItem('sett_notifVol') || '80')) / 100 * 0.3;
    gain.gain.value = vol;
    const play = (freq, start, dur) => {
      const o = ctx.createOscillator();
      o.connect(gain);
      o.frequency.value = freq;
      o.type = 'sine';
      gain.gain.setValueAtTime(vol, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      o.start(ctx.currentTime + start);
      o.stop(ctx.currentTime + start + dur);
    };
    if (type === 'soft')    { play(880, 0, 0.3); }
    else if (type === 'classic') { play(660, 0, 0.1); play(880, 0.12, 0.25); }
    else if (type === 'loud')    { play(1100, 0, 0.4); }
  } catch {}
}

};
let _settingsPage = 'account';

function openSettings(page) {
  page = page || _settingsPage || 'account';
  _settingsPage = page;
  const overlay = $('#settings-overlay');
  overlay.classList.add('open');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => overlay.classList.add('visible'));
  });
  renderSettingsPage(page);
}

function closeSettings() {
  const overlay = $('#settings-overlay');
  overlay.classList.remove('visible');
  setTimeout(() => overlay.classList.remove('open'), 180);
}

function renderSettingsPage(page) {
  _settingsPage = page;
  // update nav active state
  $$('#settings-nav .settings-nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.page === page);
  });
  const def = _settingsPages[page];
  const content = $('#settings-content');
  if (!def) return;
  content.innerHTML = def.render();
  // wire up generic toggles
  content.querySelectorAll('.sett-toggle[data-key]').forEach(btn => {
    btn.onclick = () => {
      const key = btn.dataset.key;
      const off = btn.dataset.off || 'off';
      const isOn = btn.classList.toggle('on');
      localStorage.setItem(key, isOn ? 'on' : off);
    };
  });
  // ── appearance page wiring ──────────────────────────────────────
  if (page === 'appearance') {
    // theme cards
    content.querySelectorAll('.theme-card').forEach(card => {
      card.onclick = () => {
        content.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        const th = card.dataset.theme;
        applyTheme(th);
        const crows = $('#custom-color-rows');
        if (crows) crows.style.display = (th === 'custom') ? 'block' : 'none';
      };
    });
    // custom theme color pickers
    content.querySelectorAll('.sett-color-pick').forEach(inp => {
      const varName = inp.dataset.var;
      const cur = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
      inp.value = cur || '#313338';
      inp.oninput = () => {
        document.documentElement.style.setProperty(varName, inp.value);
        const custom = JSON.parse(localStorage.getItem('sett_customTheme') || '{}');
        custom[varName] = inp.value;
        localStorage.setItem('sett_customTheme', JSON.stringify(custom));
      };
    });
    // font size slider
    const slFont = $('#sl-font'), slFontVal = $('#sl-font-val'), fontPrev = $('#font-preview');
    if (slFont) {
      slFont.oninput = () => {
        const v = slFont.value;
        if (slFontVal) slFontVal.textContent = v + 'px';
        if (fontPrev) fontPrev.style.fontSize = v + 'px';
        applyFontSize(parseInt(v));
      };
    }
    // scale slider
    const slScale = $('#sl-scale'), slScaleVal = $('#sl-scale-val');
    if (slScale) {
      slScale.oninput = () => {
        const v = slScale.value;
        if (slScaleVal) slScaleVal.textContent = v + '%';
        applyScale(parseInt(v));
      };
    }
    // avatar size slider
    const slAv = $('#sl-avsize'), slAvVal = $('#sl-avsize-val');
    if (slAv) {
      slAv.oninput = () => {
        const v = slAv.value;
        if (slAvVal) slAvVal.textContent = v + 'px';
        applyAvatarSize(parseInt(v));
      };
    }
    // compact toggle
    const compBtn = $('#toggle-compact');
    if (compBtn) {
      compBtn.onclick = () => {
        const on = compBtn.classList.toggle('on');
        applyCompact(on);
      };
    }
    // bg presets
    content.querySelectorAll('.bg-preset[data-bg]').forEach(el => {
      el.onclick = () => {
        content.querySelectorAll('.bg-preset').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        applyChatBg(el.dataset.bg);
      };
    });
    // bg file upload
    const bgFile = $('#bg-file-input');
    if (bgFile) {
      bgFile.onchange = () => {
        const f = bgFile.files?.[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = e => {
          const url = e.target.result;
          localStorage.setItem('sett_chatBgUrl', url);
          localStorage.setItem('sett_chatBg', 'custom');
          const msgs = document.querySelector('#messages');
          if (msgs) { msgs.style.backgroundImage = `url(${url})`; msgs.style.backgroundSize = 'cover'; msgs.style.backgroundPosition = 'center'; }
        };
        reader.readAsDataURL(f);
      };
    }
  }
  // ── account page wiring ──────────────────────────────────────────
  if (page === 'account') {
    const grid        = $('#avatar-grid');
    const statusInput = $('#sett-status-text');
    const saveBar     = $('#acct-save-bar');
    const saveBtn     = $('#acct-save-btn');
    const resetBtn    = $('#acct-reset-btn');
    const prevAvatar  = $('#preview-avatar');
    const prevStatus  = $('#preview-status-text');
    const avatarFileInput  = $('#avatar-file-input');
    const btnRemoveAvatar  = $('#btn-remove-avatar');
    let draft = { avatar_color: _profile.avatar_color, custom_status: _profile.custom_status, avatar_url: _profile.avatar_url };

    function acctCheckDirty() {
      const dirty = draft.avatar_color !== _profile.avatar_color ||
                    draft.custom_status !== _profile.custom_status ||
                    draft.avatar_url !== _profile.avatar_url;
      if (saveBar) saveBar.style.display = dirty ? '' : 'none';
    }

    // custom avatar upload via base64 (small images only; large ones go to /api/upload)
    if (avatarFileInput) {
      avatarFileInput.onchange = () => {
        const f = avatarFileInput.files?.[0];
        if (!f) return;
        if (f.size > 3 * 1024 * 1024) { toast('Файл слишком большой (макс. 3 МБ)', 'var(--red)'); return; }
        const reader = new FileReader();
        reader.onload = e => {
          draft.avatar_url = e.target.result;
          if (prevAvatar) {
            prevAvatar.innerHTML = `<img src="${draft.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            prevAvatar.style.background = 'transparent';
          }
          acctCheckDirty();
        };
        reader.readAsDataURL(f);
      };
    }
    if (btnRemoveAvatar) {
      btnRemoveAvatar.onclick = () => {
        draft.avatar_url = '';
        if (prevAvatar) {
          prevAvatar.innerHTML = '';
          prevAvatar.textContent = username ? username.charAt(0).toUpperCase() : '?';
          prevAvatar.style.background = draft.avatar_color;
        }
        acctCheckDirty();
      };
    }

    grid?.addEventListener('click', e => {
      const opt = e.target.closest('.sett-avatar-option');
      if (!opt) return;
      grid.querySelectorAll('.sett-avatar-option').forEach(el => el.classList.remove('selected'));
      opt.classList.add('selected');
      draft.avatar_color = opt.dataset.color;
      if (prevAvatar) {
        if (!draft.avatar_url) {
          prevAvatar.innerHTML = '';
          prevAvatar.textContent = username ? username.charAt(0).toUpperCase() : '?';
          prevAvatar.style.background = draft.avatar_color;
        }
      }
      acctCheckDirty();
    });
    statusInput?.addEventListener('input', () => {
      draft.custom_status = statusInput.value;
      if (prevStatus) prevStatus.textContent = statusInput.value;
      acctCheckDirty();
    });
    resetBtn?.addEventListener('click', () => {
      draft = { avatar_color: _profile.avatar_color, custom_status: _profile.custom_status, avatar_url: _profile.avatar_url };
      if (statusInput) statusInput.value = _profile.custom_status || '';
      if (prevAvatar) {
        if (_profile.avatar_url) {
          prevAvatar.innerHTML = `<img src="${_profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
          prevAvatar.style.background = 'transparent';
        } else {
          prevAvatar.innerHTML = '';
          prevAvatar.textContent = username ? username.charAt(0).toUpperCase() : '?';
          prevAvatar.style.background = _profile.avatar_color;
        }
      }
      if (prevStatus) prevStatus.textContent = _profile.custom_status || '';
      grid?.querySelectorAll('.sett-avatar-option').forEach(el => {
        if (el.dataset.color === _profile.avatar_color) { el.classList.add('selected'); }
        else { el.classList.remove('selected'); }
      });
      if (saveBar) saveBar.style.display = 'none';
    });
    saveBtn?.addEventListener('click', async () => {
      try {
        const res = await fetch(`/api/users/${encodeURIComponent(username)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ avatar_color: draft.avatar_color, avatar_url: draft.avatar_url || '', custom_status: draft.custom_status }),
        });
        if (res.ok) {
          _profile = { ..._profile, ...await res.json() };
          applyProfileToUI();
          if (saveBar) saveBar.style.display = 'none';
          toast('Профиль обновлён', 'var(--green)');
        }
      } catch { toast('Ошибка при сохранении', 'var(--red)'); }
    });
  }
  // ── profile page wiring ──────────────────────────────────────────
  if (page === 'profile') {
    const bannerInput = $('#sett-banner-color');
    const bannerSwatch = $('#banner-swatch');
    const bannerFill   = $('#banner-color-fill');
    const aboutInput  = $('#sett-about-me');
    const charsLeft   = $('#about-chars-left');
    const prevBanner  = $('#preview-prof-banner');
    const prevAbout   = $('#preview-about-me');
    const saveBar     = $('#prof-save-bar');
    const saveBtn     = $('#prof-save-btn');
    const resetBtn    = $('#prof-reset-btn');
    let draft = { banner_color: _profile.banner_color, about_me: _profile.about_me };

    function profCheckDirty() {
      const dirty = draft.banner_color !== _profile.banner_color ||
                    draft.about_me !== _profile.about_me;
      if (saveBar) saveBar.style.display = dirty ? '' : 'none';
    }
    bannerInput?.addEventListener('input', () => {
      draft.banner_color = bannerInput.value;
      if (bannerSwatch) bannerSwatch.style.background = draft.banner_color;
      if (bannerFill)   bannerFill.style.background   = draft.banner_color;
      if (prevBanner)   prevBanner.style.background   = draft.banner_color;

      };

  }
  // ── voice page wiring ─────────────────────────────────────────────
  if (page === 'voice') {
    // populate device dropdowns
    (async () => {
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        const devices = await navigator.mediaDevices.enumerateDevices();
        const mics  = devices.filter(d => d.kind === 'audioinput');
        const cams  = devices.filter(d => d.kind === 'videoinput');
        const savedMic = localStorage.getItem('sett_micId') || '';
        const savedCam = localStorage.getItem('sett_camId') || '';
        const selMic = $('#sel-mic'), selCam = $('#sel-cam');
        if (selMic) {
          selMic.innerHTML = mics.map(d => `<option value="${d.deviceId}" ${d.deviceId===savedMic?'selected':''}>${d.label||'Микрофон '+d.deviceId.slice(0,6)}</option>`).join('') || '<option>Устройства не найдены</option>';
          selMic.onchange = () => localStorage.setItem('sett_micId', selMic.value);
