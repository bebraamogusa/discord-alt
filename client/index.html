        if (selCam) {
          selCam.innerHTML = cams.map(d => `<option value="${d.deviceId}" ${d.deviceId===savedCam?'selected':''}>${d.label||'Камера '+d.deviceId.slice(0,6)}</option>`).join('') || '<option>Устройства не найдены</option>';
          selCam.onchange = () => localStorage.setItem('sett_camId', selCam.value);
        }
      } catch {}
    })();
    // mic test
    let _micTestStream = null, _micTestAnim = null;
    const btnMicTest = $('#btn-mic-test'), micBar = $('#mic-level-bar'), micFill = $('#mic-level-fill');
    if (btnMicTest) {
      btnMicTest.onclick = async () => {
        if (_micTestStream) {
          _micTestStream.getTracks().forEach(t => t.stop());
          _micTestStream = null;
          cancelAnimationFrame(_micTestAnim);
          if (micBar) micBar.style.display = 'none';
          btnMicTest.textContent = '▶ Тест';
          return;
        }
        try {
          _micTestStream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: localStorage.getItem('sett_micId') || undefined } });
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          const src  = actx.createMediaStreamSource(_micTestStream);
          const analyser = actx.createAnalyser();
          analyser.fftSize = 256;
          src.connect(analyser);
          const data = new Uint8Array(analyser.frequencyBinCount);
          if (micBar) micBar.style.display = '';
          btnMicTest.textContent = '⏹ Стоп';
          (function frame() {
            analyser.getByteTimeDomainData(data);
            let sum = 0;
            data.forEach(v => { const d = v - 128; sum += d * d; });
            const rms = Math.sqrt(sum / data.length);
            if (micFill) micFill.style.width = Math.min(100, rms * 4) + '%';
            _micTestAnim = requestAnimationFrame(frame);
          })();
        } catch { toast('Нет доступа к микрофону', 'var(--red)'); }
      };
    }
    // camera preview
    let _camStream = null;
    const btnCam = $('#btn-cam-preview'), camVid = $('#cam-preview-vid');
    if (btnCam) {
      btnCam.onclick = async () => {
        if (_camStream) {
          _camStream.getTracks().forEach(t => t.stop());
          _camStream = null;
          if (camVid) { camVid.srcObject = null; camVid.style.display = 'none'; }
          btnCam.textContent = '▶ Превью';
          return;
        }
        try {
          _camStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: localStorage.getItem('sett_camId') || undefined } });
          if (camVid) { camVid.srcObject = _camStream; camVid.style.display = ''; }

      localStorage.setItem('sett_vad', useVad ? 'on' : 'off');
      if (btnVad) { btnVad.classList.toggle('selected-mode', useVad); }
      if (btnPtt) { btnPtt.classList.toggle('selected-mode', !useVad); }

      if (pttRow)  pttRow.style.display  = useVad ? 'none' : '';
    }
    if (btnVad) btnVad.onclick = () => setVoiceMode(true);
    if (btnPtt) btnPtt.onclick = () => setVoiceMode(false);
    // VAD threshold slider
    const slThr = $('#sl-vad-thr'), slThrVal = $('#sl-vad-thr-val');
    if (slThr) {
      slThr.oninput = () => {
        if (slThrVal) slThrVal.textContent = slThr.value;
        localStorage.setItem('sett_vadThr', slThr.value);
      };
    }
    // PTT rebind
    const btnPttRebind = $('#btn-ptt-rebind'), kbListen = $('#kb-listening');
    if (btnPttRebind && kbListen) {
      btnPttRebind.onclick = () => {
        kbListen.style.display = '';
        const handler = e => {
          e.preventDefault();
          const key = e.key;
          localStorage.setItem('sett_pttKey', key);
          const disp = $('#ptt-key-display');
          if (disp) { const kbd = disp.querySelector('kbd'); if (kbd) kbd.textContent = key; }
          kbListen.style.display = 'none';
          document.removeEventListener('keydown', handler, true);
        };
        document.addEventListener('keydown', handler, true);
      };
    }
  }
  // ── keybinds page wiring ──────────────────────────────────────────
  if (page === 'keybinds') {
    let _listeningId = null;
    const kbListenBox = $('#kb-listening');
    content.querySelectorAll('.btn-kb-edit').forEach(btn => {
      btn.onclick = () => {
        _listeningId = btn.dataset.id;
        if (kbListenBox) kbListenBox.style.display = '';
        const handler = e => {
          if (e.key === 'Escape') { if (kbListenBox) kbListenBox.style.display = 'none'; document.removeEventListener('keydown', handler, true); return; }
          e.preventDefault();
          const parts = [];
          if (e.ctrlKey) parts.push('ctrl');
          if (e.shiftKey) parts.push('shift');
          if (e.altKey) parts.push('alt');
          if (e.metaKey) parts.push('meta');
          const k = e.key.toLowerCase();
          if (!['control','shift','alt','meta'].includes(k)) parts.push(k);
          const kb = loadKeybinds();
          kb[_listeningId] = { ...kb[_listeningId], keys: parts };
          saveKeybinds(kb);
          const disp = $(`#kb-display-${_listeningId}`);
          if (disp) disp.innerHTML = keysDisplay(parts);
          if (kbListenBox) kbListenBox.style.display = 'none';
          document.removeEventListener('keydown', handler, true);
        };
        document.addEventListener('keydown', handler, true);
      };
    });
    content.querySelectorAll('.btn-kb-reset').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        const def = DEFAULT_KEYBINDS[id];
        if (!def) return;
        const kb = loadKeybinds();
        kb[id] = { ...def };
        saveKeybinds(kb);
        const disp = $(`#kb-display-${id}`);
        if (disp) disp.innerHTML = keysDisplay(def.keys);
      };
    });
  }
  // ── privacy page wiring ───────────────────────────────────────────
  if (page === 'privacy') {
    const blockedList = $('#blocked-list');
    if (blockedList && username) {
      fetch(`/api/users/${encodeURIComponent(username)}/blocks`)
        .then(r => r.ok ? r.json() : [])
        .then(list => {
          if (!list.length) { blockedList.innerHTML = '<div class="sett-desc">Нет заблокированных пользователей</div>'; return; }
          blockedList.innerHTML = list.map(u => `
            <div class="blocked-user-row">
              <div class="blocked-avatar" style="background:${u.avatar_color||'#5865f2'};">${(u.username||'?')[0].toUpperCase()}</div>
              <span class="sett-label" style="flex:1;">${u.username}</span>
              <button class="btn-ghost btn-unblock" data-user="${u.username}" style="padding:4px 12px;font-size:12px;">Разблокировать</button>
            </div>`).join('');
          blockedList.querySelectorAll('.btn-unblock').forEach(btn => {
            btn.onclick = async () => {
              const target = btn.dataset.user;
              const r = await fetch(`/api/users/${encodeURIComponent(username)}/block/${encodeURIComponent(target)}`, { method: 'DELETE' });
              if (r.ok) { btn.closest('.blocked-user-row').remove(); toast(`${target} разблокирован`, 'var(--green)'); }
            };
          });
        })
        .catch(() => { blockedList.innerHTML = '<div class="sett-desc">Ошибка загрузки</div>'; });
    }
  }
}

function setupMentionAutocomplete() {
  const inp = $('#msg-input');
  const pop = $('#mention-popup');
  inp.addEventListener('input', updateMentionPopup);
  inp.addEventListener('keydown', e => {
    if (!pop || pop.style.display === 'none' || !pop.style.display) return;
    const items = pop.querySelectorAll('.mention-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown')                 { e.preventDefault(); mentionMove(1, items); }
    else if (e.key === 'ArrowUp')              { e.preventDefault(); mentionMove(-1, items); }
    else if (e.key === 'Tab' || e.key === 'Enter') {
      const sel = pop.querySelector('.mention-item.selected');
      if (sel) { e.preventDefault(); e.stopPropagation(); insertMention(sel.dataset.name); }
    } else if (e.key === 'Escape')             { hideMentionPopup(); }
  });
  document.addEventListener('click', e => {
    if (pop && !pop.contains(e.target) && e.target !== inp) hideMentionPopup();
  });
}
function getMentionQuery() {
  const inp = $('#msg-input');
  const m = inp.value.slice(0, inp.selectionStart).match(/@(\w*)$/);
  return m ? m[1] : null;
}
function updateMentionPopup() {
  const pop = $('#mention-popup');
  const query = getMentionQuery();
  if (query === null) { hideMentionPopup(); return; }
  const matches = currentUsers.filter(u =>
    u.toLowerCase().startsWith(query.toLowerCase()) && u !== username
  );
  if (!matches.length) { hideMentionPopup(); return; }
  mentionIdx = 0;
  pop.innerHTML = matches.slice(0,8).map((u, i) =>
    `<div class="mention-item${i===0?' selected':''}" data-name="${esc(u)}" onclick="insertMention('${esc(u)}')">` +
    `<div class="m-avatar" style="background:${avatarColor(u)}">${u.charAt(0).toUpperCase()}</div>` +
    `<span class="m-name">${esc(u)}</span></div>`
  ).join('');
  const inp = $('#msg-input');
  const rect = inp.getBoundingClientRect();
  pop.style.display = 'block';
  pop.style.bottom  = (window.innerHeight - rect.top + 4) + 'px';
  pop.style.left    = rect.left + 'px';
}
function hideMentionPopup() {
  const pop = $('#mention-popup');
  if (pop) pop.style.display = 'none';
  mentionIdx = -1;
}
function mentionMove(delta, items) {
  items[Math.max(0, mentionIdx)]?.classList.remove('selected');
  mentionIdx = (mentionIdx + delta + items.length) % items.length;
  items[mentionIdx].classList.add('selected');
}
function insertMention(name) {
  const inp = $('#msg-input');
  const pos = inp.selectionStart;
  const before = inp.value.slice(0, pos);
  const after  = inp.value.slice(pos);
  const m = before.match(/@(\w*)$/);
  if (!m) { hideMentionPopup(); return; }
  const newBefore = before.slice(0, before.length - m[0].length) + '@' + name + ' ';
  inp.value = newBefore + after;
  inp.selectionStart = inp.selectionEnd = newBefore.length;
  inp.focus();
  inp.dispatchEvent(new Event('input'));
  hideMentionPopup();
}

function setupEmojiPicker() {
  const picker = $('#emoji-picker');
  const catsEl = $('#ep-cats');
  const searchEl = $('#ep-search');

  // Build category tabs
  catsEl.innerHTML = '';
  _epCatList.forEach((cat, i) => {
    const btn = document.createElement('div');
    btn.className = 'ep-cat' + (i === 0 ? ' active' : '');
    btn.textContent = cat.split(' ')[0]; // just the emoji
    btn.title = cat;
    btn.onclick = () => {
      _epCat = i;
      _epFilter = '';
      searchEl.value = '';
      catsEl.querySelectorAll('.ep-cat').forEach((b,j) => b.classList.toggle('active', j===i));
      renderEpGrid();
    };
    catsEl.appendChild(btn);
  });

  searchEl.addEventListener('input', () => {
    _epFilter = searchEl.value.toLowerCase();
    _epCat = -1;
    catsEl.querySelectorAll('.ep-cat').forEach(b => b.classList.remove('active'));
    renderEpGrid();
  });

  // Close on outside click
  document.addEventListener('mousedown', e => {
    if (!picker.contains(e.target) && e.target.id !== 'btn-emoji' && !e.target.closest('.add-reaction-btn')) {
      closeEmojiPicker();
    }
  });

  // Emoji button in input bar
  $('#btn-emoji').onclick = e => {
    e.stopPropagation();
    if (picker.style.display === 'flex') { closeEmojiPicker(); return; }
    openEmojiPicker(e.currentTarget, null);
  };

  renderEpGrid();
}

function renderEpGrid() {
  const gridEl = $('#ep-grid');
  gridEl.innerHTML = '';
  let emojis = [];
  if (_epFilter) {
    // search across all categories
    _epCatList.forEach(cat => {
      EMOJI_DATA[cat].forEach(e => { if (e.includes(_epFilter)) emojis.push(e); });
    });
  } else {
    const cat = _epCatList[_epCat] || _epCatList[0];
    emojis = EMOJI_DATA[cat] || [];
  }
  emojis.forEach(em => {
    const span = document.createElement('span');
    span.className = 'ep-emoji';
    span.textContent = em;
    span.onclick = () => onEmojiSelect(em);
    gridEl.appendChild(span);
  });
}

function openEmojiPicker(anchor, msgId) {
  const picker = $('#emoji-picker');
  _epMode = msgId ? 'react' : 'input';
  _epMsgId = msgId;

  picker.style.display = 'flex';

  // Position the picker above the anchor
  const r = anchor.getBoundingClientRect();
  const pw = 340, ph = 340;
  let left = r.left;
  let top  = r.top - ph - 6;
  if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  if (top < 8) top = r.bottom + 6;
  picker.style.left = left + 'px';
  picker.style.top  = top  + 'px';

  $('#ep-search').focus();
}

function closeEmojiPicker() {
  const picker = $('#emoji-picker');
  picker.style.display = 'none';
  _epMsgId = null;
}

function onEmojiSelect(em) {
  if (_epMode === 'input') {
    // Insert into textarea
    const inp = $('#msg-input');
    const s = inp.selectionStart, e = inp.selectionEnd;
    inp.value = inp.value.slice(0, s) + em + inp.value.slice(e);
    inp.selectionStart = inp.selectionEnd = s + [...em].length;
    inp.focus();
    closeEmojiPicker();
  } else if (_epMode === 'react' && _epMsgId) {
    const msgId = _epMsgId;
    closeEmojiPicker();
    // Check if we already reacted with this emoji
    const reactArea = $('#reactions-' + msgId);
    const existing = reactArea?.querySelector('[data-emoji="' + em + '"]');
    const hasMe = existing?.classList.contains('me');
    if (hasMe) {
      socket.emit('reaction-remove', { msgId, emoji: em });
    } else {
      socket.emit('reaction-add', { msgId, emoji: em });
    }
  }
}

function buildReactionPills(container, msgId, reactions) {
  container.innerHTML = '';
  reactions.forEach(({ emoji, users }) => {
    if (!users || !users.length) return;
    const hasMe = users.includes(username);
    const pill = document.createElement('button');
    pill.className = 'reaction-pill' + (hasMe ? ' me' : '');
    pill.dataset.emoji = emoji;
    pill.title = users.join(', ');
    pill.innerHTML = `<span class="r-emoji">${emoji}</span><span class="r-count">${users.length}</span>`;
    pill.onclick = () => {
      if (hasMe) socket.emit('reaction-remove', { msgId, emoji });
      else        socket.emit('reaction-add',    { msgId, emoji });
    };
    container.appendChild(pill);
  });
}

function renderReactions(msgId, reactions) {
  const container = $('#reactions-' + msgId);
  if (!container) return;
  buildReactionPills(container, msgId, reactions);
}

/* ================================================================
   VAD — Voice Activity Detection (speaking indicator)
   ================================================================ */
let _vadAnim = null;
function startVAD(stream) {
  stopVAD();
  if (!stream || !stream.getAudioTracks().length) return;
  try {
    const actx     = new (window.AudioContext || window.webkitAudioContext)();
    const src      = actx.createMediaStreamSource(stream);
    const analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    function tick() {
      _vadAnim = requestAnimationFrame(tick);
      analyser.getByteTimeDomainData(buf);
      let rms = 0;
      for (let i = 0; i < buf.length; i++) { const v = (buf[i] - 128) / 128; rms += v * v; }
      rms = Math.sqrt(rms / buf.length);
      document.getElementById('video-local')?.classList.toggle('speaking', rms > 0.025);
    }
    tick();
  } catch (_) {}
}
function stopVAD() {
  if (_vadAnim) { cancelAnimationFrame(_vadAnim); _vadAnim = null; }
  document.getElementById('video-local')?.classList.remove('speaking');
}

/* ================================================================
   Audio recording (MediaRecorder)
   ================================================================ */
let _mediaRecorder = null;
let _audioChunks   = [];
let _recStream     = null;

function setupAudioRecord() {
  $('#btn-record').onclick = toggleRecord;
}

async function toggleRecord() {
  if (_mediaRecorder && _mediaRecorder.state === 'recording') {
    _mediaRecorder.stop();
    return;
  }
  try {
    _recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch { return toast('Microphone access denied', 'var(--red)'); }

  const mimeType = MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')
    ? 'audio/ogg;codecs=opus'
    : MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : 'audio/webm';
  const ext = mimeType.startsWith('audio/ogg') ? 'ogg' : 'weba';

  _mediaRecorder = new MediaRecorder(_recStream, { mimeType });
  _audioChunks   = [];

  _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _audioChunks.push(e.data); };
  _mediaRecorder.onstop = async () => {
    _recStream.getTracks().forEach(t => t.stop());
    _recStream = null;
    $('#btn-record').classList.remove('recording');
    $('#btn-record').title = 'Record voice message';

    const blob = new Blob(_audioChunks, { type: mimeType });
    const file = new File([blob], `voice-${Date.now()}.${ext}`, { type: mimeType });
    await uploadFile(file);
  };

  _mediaRecorder.start();
  $('#btn-record').classList.add('recording');
  $('#btn-record').title = 'Stop recording (click again)';
  toast('Recording… click 🎤 to stop');
}

  _renderTypingBar();
}
function _renderTypingBar() {
  const bar = $('#typing-bar');
  if (!bar) return;
  const names = [..._typingUsers.keys()];
  if (!names.length) { bar.innerHTML = ''; return; }
  const who = names.length === 1 ? names[0]
    : names.length === 2 ? `${names[0]} and ${names[1]}`
    : `${names[0]} and ${names.length - 1} others`;
  bar.innerHTML = `<span>${esc(who)} is typing</span><span class="typing-dots"><span></span><span></span><span></span></span>`;
}

/* ---- HTML Sanitizer (DOMParser-based whitelist) -------------- */
const _ALLOWED_TAGS = new Set(['strong','em','s','span','a','code','pre','br','b','i']);
const _ALLOWED_ATTRS = { a: ['href','target','rel'], span: ['class'], '*': [] };
function sanitizeHtml(html) {
  const doc = new DOMParser().parseFromString(`<body>${html}</body>`, 'text/html');
  function clean(node) {
    if (node.nodeType === 3) return; // text node – safe
    if (node.nodeType === 1) {
      const tag = node.tagName.toLowerCase();
      if (!_ALLOWED_TAGS.has(tag)) { node.replaceWith(...node.childNodes); return; }
      // Strip disallowed attributes
      const allowed = _ALLOWED_ATTRS[tag] || _ALLOWED_ATTRS['*'] || [];
      [...node.attributes].forEach(a => { if (!allowed.includes(a.name)) node.removeAttribute(a.name); });
      // Force links to safe target+rel
      if (tag === 'a') {
        const href = node.getAttribute('href') || '';
        if (!/^https?:\/\//i.test(href) && !href.startsWith('/')) node.removeAttribute('href');
        node.setAttribute('target', '_blank');
        node.setAttribute('rel', 'noopener noreferrer');
      }
    }
    [...node.childNodes].forEach(clean);
  }
  [...doc.body.childNodes].forEach(clean);
  return doc.body.innerHTML;
}

/* ---- Lazy-image observer ------------------------------------- */
let _lazyObserver = null;
function observeLazyImage(img) {
  if (!_lazyObserver) {
    _lazyObserver = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('loaded');
          _lazyObserver.unobserve(e.target);
        }
      });
    }, { rootMargin: '200px' });
  }
  // If already in cache / loaded
  if (img.complete) img.classList.add('loaded');
  else _lazyObserver.observe(img);
}
function _updateDocTitle() {
  const total = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
  document.title = total > 0 ? `(${total}) ${_tabTitle}` : _tabTitle;
}

function _playNotifSound() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch (_) {}
}

function _showDesktopNotif(user, text) {
  const body = text.slice(0, 120);
  // Tauri v2 notification plugin
  if (window.__TAURI_INTERNALS__) {
    window.__TAURI_INTERNALS__.invoke('plugin:notification|notify', {
      title: user, body
    }).catch(() => {});
    return;
  }
  // Web Notifications API
  if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
    try { new Notification(user, { body, icon: '/favicon.ico' }); } catch (_) {}
  }
}


function startEdit(msgEl, msgId, content) {
  if (editingMsgId) cancelEdit();
  editingMsgId    = msgId;
  editOrigContent = content;
  const bodyEl = msgEl.querySelector('.msg-body');
  const ctEl   = bodyEl.querySelector('.msg-text');
  if (ctEl) ctEl.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'msg-edit-wrap';
  wrap.id = 'edit-wrap-' + msgId;
  const ta = document.createElement('textarea');
  ta.className = 'msg-edit-input';
  ta.id = 'edit-input-' + msgId;
  ta.value = content;
  const hint = document.createElement('span');
  hint.className = 'msg-edit-hint';
  hint.innerHTML = '<kbd>Enter</kbd> save &nbsp; <kbd>Esc</kbd> cancel &nbsp; <kbd>Shift+Enter</kbd> newline';
  wrap.appendChild(ta);
  wrap.appendChild(hint);
  bodyEl.appendChild(wrap);
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
  ta.focus();
  ta.selectionStart = ta.selectionEnd = ta.value.length;
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
    else { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
  });
}
function saveEdit() {
  if (!editingMsgId) return;
  const ta = document.getElementById('edit-input-' + editingMsgId);
  const newText = ta?.value.trim();
  if (!newText) { cancelEdit(); return; }
  socket.emit('edit-message', { roomId, id: editingMsgId, content: newText });
  applyEdit(editingMsgId, newText);
}
function cancelEdit() {
  if (!editingMsgId) return;
  const msgEl = document.getElementById('msg-' + editingMsgId);
  if (msgEl) {
    const ctEl = msgEl.querySelector('.msg-text');
    if (ctEl) ctEl.style.display = '';
  }
  document.getElementById('edit-wrap-' + editingMsgId)?.remove();
  editingMsgId = null;
}
function applyEdit(id, content) {
  const msgEl = document.getElementById('msg-' + id);
  if (!msgEl) return;
  document.getElementById('edit-wrap-' + id)?.remove();
  const ctEl = msgEl.querySelector('.msg-text');
  if (ctEl) {
    ctEl.innerHTML    = sanitizeHtml(mdRender(content));
    ctEl.dataset.raw  = content;
    ctEl.style.display = '';
    if (!msgEl.querySelector('.msg-edited-mark')) {
      const mark = document.createElement('span');
      mark.className   = 'msg-edited-mark';
      mark.textContent = '(edited)';
      const timeEl = msgEl.querySelector('.msg-time') || msgEl.querySelector('.msg-header');
      timeEl?.insertAdjacentElement('afterend', mark);
    }
  }
  editingMsgId = null;
}
</script>
