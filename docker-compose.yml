services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "40000-49999:40000-49999/udp"
    environment:
      - MEDIASOUP_ANNOUNCED_IP=178.236.243.109
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    env_file:
      - .env
    mem_limit: 512m

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - app
